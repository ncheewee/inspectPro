                        <Avatar user={u} size={20}/><span style={{fontSize:11,fontWeight:600,color:"var(--t1)"}}>{u.name.split(" ")[0]}</span>
                      </div>)}
                      {isM&&<div style={{display:"flex",gap:4,marginTop:2}}>
                        <button onClick={()=>{setEf({inspIds:[...(s.inspectorIds||[])],supIds:[...(s.supervisorIds||[])],zoneId:s.zoneId});setEditCell({day,slotId:s.id});}} style={{background:"none",border:"none",cursor:"pointer",fontSize:10,color:"var(--t3)",padding:"1px 3px"}}>Edit ✏️</button>
                        <button onClick={()=>deleteSlot(s.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:10,color:"var(--red)",padding:"1px 3px"}}>✕</button>
                      </div>}
                    </div>;})}
                  {isM&&<button onClick={()=>{setEf({inspIds:[],supIds:[],zoneId:zone.id});setEditCell({day,slotId:null});}} style={{background:"transparent",border:"1px dashed var(--bd2)",borderRadius:5,padding:"3px 0",color:"var(--t3)",cursor:"pointer",fontSize:11,width:"100%",textAlign:"center"}}>+</button>}
                </div>
              </td>;
            })}
          </tr>)}</tbody>
        </table>
      </div>
    }
    {showAutoPlan&&<AutoPlanModal users={users} zones={zones} onClose={()=>setShowAutoPlan(false)} today={today} onApplied={load}/>}
    {editCell&&<Modal onClose={()=>setEditCell(null)} title={editCell.slotId?"Edit Slot":"Add Slot"} maxW={460}>
      <Lbl>Zone</Lbl>
      <select value={ef.zoneId} onChange={e=>setEf(f=>({...f,zoneId:e.target.value}))} style={C.inp({marginBottom:12})}>
        <option value="">— Select zone —</option>
        {zones.map(z=><option key={z.id} value={z.id}>{z.id} – {z.name}</option>)}
      </select>
      <Lbl>Inspector(s)</Lbl>
      <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:12}}>
        {users.filter(u=>u.role==="inspector").map(u=><label key={u.id} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 10px",background:ef.inspIds.includes(u.id)?"var(--bbg)":"var(--surf)",border:`1px solid ${ef.inspIds.includes(u.id)?"var(--blue)":"var(--bd)"}`,borderRadius:20,cursor:"pointer"}}>
          <input type="checkbox" checked={ef.inspIds.includes(u.id)} onChange={()=>setEf(f=>({...f,inspIds:toggleId(f.inspIds,u.id)}))} style={{accentColor:"var(--blue)"}}/>
          <Avatar user={u} size={18}/><span style={{fontSize:13,fontWeight:600,color:"var(--t1)"}}>{u.name.split(" ")[0]}</span>
        </label>)}
      </div>
      <Lbl>Supervisor (optional)</Lbl>
      <select value={ef.supIds[0]||""} onChange={e=>setEf(f=>({...f,supIds:e.target.value?[e.target.value]:[]}))} style={C.inp({marginBottom:16})}>
        <option value="">None</option>
        {users.filter(u=>u.role==="manager").map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
      </select>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
        <button onClick={()=>setEditCell(null)} style={C.btn("ghost")}>Cancel</button>
        <button onClick={saveSlot} disabled={!ef.zoneId} style={{...C.btn("pri"),opacity:ef.zoneId?1:.35}}>Save</button>
      </div>
    </Modal>}
  </div>;
}

// ── YEAR PLAN VIEW ────────────────────────────────────────────────────────────
function YearPlanView({users,zones,today,authUser}){
  const [yr,setYr]=useState(today.getFullYear());
  const [yearData,setYearData]=useState({});
  const [loading,setLoading]=useState(true);
  const [mode,setMode]=useState("dot");
  const [showAutoPlan,setShowAutoPlan]=useState(false);
  const todayWk=wkKey(today);

  useEffect(()=>{
    setLoading(true);
    api.get(`/api/roster/range?from=${yr}-W01&to=${yr}-W53`)
      .then(d=>setYearData(d)).catch(()=>{})
      .finally(()=>setLoading(false));
  },[yr]);

  const weeks=[];
  const d=new Date(getMon(new Date(yr,0,1)));
  while(weeks.length<=53){
    const{week,year:wy}=isoWk(d);if(wy>yr)break;
    if(wy===yr){const wk=`${wy}-W${String(week).padStart(2,"0")}`;const end=new Date(d);end.setDate(end.getDate()+6);
    weeks.push({wk,week,monday:new Date(d),end,data:yearData[wk]||{}});}
    d.setDate(d.getDate()+7);
  }

  const thS={background:"var(--card2)",border:"1px solid var(--bd)",padding:"7px 6px",textAlign:"center",fontSize:12,fontWeight:600,color:"var(--t2)",position:"sticky",top:0};
  const tdS={border:"1px solid var(--bd)",padding:"4px 3px",textAlign:"center",verticalAlign:"middle"};

  return <div className="fu">
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:12}}>
      <div><h1 style={{fontSize:26,letterSpacing:"-.02em",marginBottom:4}}>Year Roster Plan</h1><Mono size={13}>Full-year view · {yr}</Mono></div>
      <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
        <div style={{display:"flex",background:"var(--surf)",border:"1px solid var(--bd)",borderRadius:8,overflow:"hidden"}}>
          {[{id:"full",l:"Names"},{id:"dot",l:"Compact"}].map(m=><button key={m.id} onClick={()=>setMode(m.id)} style={{padding:"6px 12px",fontSize:13,border:"none",cursor:"pointer",background:mode===m.id?"var(--amber)":"transparent",color:mode===m.id?"#fff":"var(--t2)",fontFamily:"'DM Sans',sans-serif",fontWeight:600}}>{m.l}</button>)}
        </div>
        <button onClick={()=>setYr(y=>y-1)} style={C.btn("ghost",{padding:"6px 11px",fontSize:13})}>← {yr-1}</button>
        <button onClick={()=>setYr(today.getFullYear())} style={C.btn("sec",{padding:"6px 10px",fontSize:13})}>This Year</button>
        <button onClick={()=>setYr(y=>y+1)} style={C.btn("ghost",{padding:"6px 11px",fontSize:13})}>{yr+1} →</button>
        {authUser?.role==="manager"&&<button onClick={()=>setShowAutoPlan(true)} style={C.btn("pri",{padding:"6px 12px",fontSize:13})}>⚡ Auto-Plan</button>}
      </div>
    </div>
    <div style={{display:"flex",gap:7,marginBottom:12,flexWrap:"wrap"}}>
      {users.map(u=><div key={u.id} style={{display:"flex",alignItems:"center",gap:6,background:"var(--card)",border:"1px solid var(--bd)",borderRadius:20,padding:"3px 10px"}}>
        <div style={{width:9,height:9,borderRadius:"50%",background:u.color}}/><span style={{fontSize:13,color:"var(--t2)"}}>{u.name.split(" ")[0]}</span>
      </div>)}
    </div>
    {loading?<div style={{textAlign:"center",padding:"48px"}}><Spinner size={24}/></div>:
      <div style={{overflowX:"auto",borderRadius:12,border:"1px solid var(--bd)"}}>
        <table style={{width:"100%",borderCollapse:"collapse",minWidth:560}}>
          <thead><tr>
            <th style={{...thS,textAlign:"left",padding:"7px 12px",width:55}}><Mono size={11}>Wk</Mono></th>
            <th style={{...thS,textAlign:"left",width:70}}><Mono size={11}>Dates</Mono></th>
            {DAYS.map(d=><th key={d} style={{...thS,minWidth:mode==="full"?95:42}}><Mono size={11}>{d}</Mono></th>)}
          </tr></thead>
          <tbody>{weeks.map(({wk,week,monday,end,data})=>{
            const isC=wk===todayWk;
            return <tr key={wk} style={{background:isC?"var(--abg)":"transparent"}}>
              <td style={{...tdS,textAlign:"left",padding:"5px 12px"}}><Mono size={12} color={isC?"var(--amber)":"var(--t3)"} style={{fontWeight:isC?600:400,whiteSpace:"nowrap"}}>{isC?"▶ ":""}{`W${String(week).padStart(2,"0")}`}</Mono></td>
              <td style={{...tdS,textAlign:"left",padding:"5px 8px"}}><Mono size={11} style={{whiteSpace:"nowrap"}}>{fS(monday)}–{fS(end)}</Mono></td>
              {DAYS.map(day=>{
                const slots=data[day]||[];
                return <td key={day} style={tdS}>
                  {mode==="full"
                    ?<div style={{display:"flex",flexDirection:"column",gap:2,padding:"2px"}}>
                      {slots.slice(0,3).map((s,i)=>{const u=users.find(u=>(s.inspectorIds||[]).includes(u.id));
                        return <div key={i} style={{fontSize:9,fontWeight:600,background:u?.color?`${u.color}22`:"var(--card2)",color:"var(--t1)",borderRadius:3,padding:"1px 4px",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:88}}>
                          {u?.name?.split(" ")[0]||"?"} <Mono size={8} color="var(--t3)">{s.zoneId}</Mono>
                        </div>;})}
                      {slots.length>3&&<Mono size={9} color="var(--t3)">+{slots.length-3}</Mono>}
                    </div>
                    :<div style={{display:"flex",justifyContent:"center",gap:2,flexWrap:"wrap",padding:"4px 2px"}}>
                      {slots.length===0?<div style={{width:8,height:8,borderRadius:"50%",background:"var(--bd)"}}/>:
                        slots.map((s,i)=>{const u=users.find(u=>(s.inspectorIds||[]).includes(u.id));return <div key={i} style={{width:9,height:9,borderRadius:"50%",background:u?.color||"var(--blue)"}}/>;})
                      }
                    </div>
                  }
                </td>;})}
            </tr>;})}
          </tbody>
        </table>
      </div>
    }
    {showAutoPlan&&<AutoPlanModal users={users} zones={zones} onClose={()=>setShowAutoPlan(false)} today={today} onApplied={()=>{setLoading(true);api.get(`/api/roster/range?from=${yr}-W01&to=${yr}-W53`).then(d=>setYearData(d)).finally(()=>setLoading(false));}}/>}
  </div>;
}

// ── REPORTS VIEW ──────────────────────────────────────────────────────────────
function ReportsView({users,zones}){
  const [inspections,setInspections]=useState([]);
  const [loading,setLoading]=useState(true);
  const [sel,setSel]=useState(null);
  const [selDetail,setSelDetail]=useState(null);
  const [loadingDetail,setLoadingDetail]=useState(false);
  const [err,setErr]=useState("");
  const [resending,setResending]=useState(null);
  const [resendMsg,setResendMsg]=useState("");
  const [lightbox,setLightbox]=useState(null);
  const openLightbox=(items,idx=0)=>setLightbox({items,idx});

  useEffect(()=>{
    api.get("/api/inspections?limit=100")
      .then(d=>setInspections(d)).catch(e=>setErr(e.message))
      .finally(()=>setLoading(false));
  },[]);

  const loadDetail=async(id)=>{
    if(sel===id){setSel(null);setSelDetail(null);return;}
    setSel(id);setLoadingDetail(true);
    try{const d=await api.get(`/api/inspections/${id}`);setSelDetail(d);}
    catch(e){setErr(e.message);}
    setLoadingDetail(false);
  };

  const resend=async(rec,e)=>{
    e.stopPropagation();
    if(!selDetail) return;
    setResending(rec.id);setResendMsg("");
    try{
      const cfg=await api.get("/api/config");
      const content=await buildEmailContent(selDetail,users,zones);
      const inspector=users.find(u=>u.id===rec.user_id);
      const subj=`InspectPro Report – ${inspector?.name||rec.user_name} – ${fD(rec.start_time)}`;
      const targets=[];
      if(inspector?.email?.trim()) targets.push({email:inspector.email.trim(),name:inspector.name,subj});
      users.filter(u=>u.role==="manager"&&u.email?.trim()).forEach(m=>{
        if(!targets.find(t=>t.email===m.email.trim()))
          targets.push({email:m.email.trim(),name:m.name,subj:`[InspectPro] ${subj}`});
      });
      if(targets.length===0){setResendMsg("⚠ No email addresses configured.");setResending(null);return;}
      const results=await Promise.allSettled(targets.map(t=>sendEmail(t.email,t.name,t.subj,content,cfg)));
      const ok=results.filter(r=>r.status==="fulfilled"&&r.value?.ok).length;
      setResendMsg(ok>0?`✅ Sent to ${targets.map(t=>t.email).join(", ")}`:`⚠ Email not sent (check EmailJS config in Menu → Email)`);
    }catch(ex){setResendMsg("❌ "+ex.message);}
    setResending(null);
  };

  if(loading) return <div style={{textAlign:"center",padding:"48px"}}><Spinner size={24}/></div>;
  if(inspections.length===0) return <div className="fu" style={{textAlign:"center",padding:"60px 20px"}}>
    <div style={{fontSize:36,marginBottom:14}}>📋</div>
    <div style={{fontWeight:600,color:"var(--t1)",fontSize:17,marginBottom:6}}>No reports yet</div>
    <p style={{color:"var(--t2)",fontSize:14}}>Submitted inspections will appear here.</p>
  </div>;

  return <div className="fu">
    <h1 style={{fontSize:26,letterSpacing:"-.02em",marginBottom:4}}>Inspection Reports</h1>
    <p style={{color:"var(--t2)",fontSize:14,marginBottom:18}}>{inspections.length} submitted</p>
    <ErrBox msg={err}/>
    {resendMsg&&<div style={{padding:"9px 13px",borderRadius:8,fontSize:13,marginBottom:12,background:resendMsg.startsWith("✅")?"var(--cl-bg)":"var(--ip-bg)",color:resendMsg.startsWith("✅")?"var(--cl-fg)":"var(--ip-fg)"}}>{resendMsg}</div>}
    <div style={{display:"flex",flexDirection:"column",gap:0,border:"1px solid var(--bd)",borderRadius:12,overflow:"hidden"}}>
      {inspections.map((rec,idx)=>{
        const isOpen=sel===rec.id;
        return <div key={rec.id} style={{borderBottom:idx<inspections.length-1?"1px solid var(--bd)":"none"}}>
          <div onClick={()=>loadDetail(rec.id)} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 18px",cursor:"pointer",background:isOpen?"var(--card2)":"var(--card)",borderLeft:isOpen?"4px solid var(--blue)":"4px solid transparent",transition:"background .15s,border-color .15s"}}>
            <Avatar user={{initials:rec.initials,color:rec.color}} size={36}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:600,fontSize:15,color:"var(--t1)",marginBottom:3}}>{rec.user_name||"Unknown"}</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                <Mono size={12} color="var(--t3)">{fD(rec.start_time)} · {fT(rec.start_time)}</Mono>
                <Mono size={11} style={{background:"var(--bbg)",padding:"1px 6px",borderRadius:4,border:"1px solid var(--bd)"}}>{rec.zone_id}</Mono>
              </div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
              {rec.flag_count>0
                ?<span style={{fontSize:12,fontWeight:600,background:"var(--op-bg)",color:"var(--op-fg)",padding:"3px 9px",borderRadius:20}}>⚠ {rec.flag_count} flagged</span>
                :<span style={{fontSize:12,fontWeight:600,background:"var(--cl-bg)",color:"var(--cl-fg)",padding:"3px 9px",borderRadius:20}}>✓ All clear</span>}
              <span style={{color:"var(--t3)",fontSize:14,transition:"transform .2s",transform:isOpen?"rotate(180deg)":"none",display:"inline-block"}}>▼</span>
            </div>
          </div>
          {isOpen&&<div style={{background:"var(--surf)",borderTop:"1px solid var(--bd2)",padding:"20px 22px"}}>
            {loadingDetail?<div style={{textAlign:"center",padding:"24px"}}><Spinner size={20}/></div>:selDetail&&
              <div>
                <div style={{display:"flex",justifyContent:"flex-end",marginBottom:14}}>
                  <button onClick={e=>resend(rec,e)} disabled={!!resending} style={{...C.btn("sec",{padding:"7px 14px",fontSize:13,display:"flex",alignItems:"center",gap:6}),opacity:resending?0.5:1}}>
                    {resending===rec.id?<><Spinner size={13}/>Sending…</>:"📤 Re-send Email"}
                  </button>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:8,marginBottom:16}}>
                  {[
                    {l:"Inspector",v:rec.user_name},
                    {l:"Zone",v:`${rec.zone_id} · ${rec.zone_name}`},
                    {l:"Date",v:fD(rec.start_time)},
                    {l:"Duration",v:rec.end_time?fDur(new Date(rec.end_time)-new Date(rec.start_time)):"–"},
                    {l:"OK items",v:rec.ok_count},
                    {l:"Flagged",v:rec.flag_count},
                  ].map(s=><div key={s.l} style={C.card({padding:"10px 12px"})}>
                    <Mono size={11} style={{display:"block",marginBottom:3,textTransform:"uppercase"}}>{s.l}</Mono>
                    <div style={{fontSize:14,fontWeight:600,color:"var(--t1)"}}>{s.v}</div>
                  </div>)}
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {(selDetail.items||[]).map(item=>{
                    const dot=item.status==="ok"?"var(--green)":item.status==="flagged"?"var(--red)":"var(--t3)";
                    return <div key={item.id} style={{display:"flex",gap:10,padding:"8px 12px",background:item.status==="flagged"?"var(--fl-bg)":item.status==="ok"?"var(--ok-bg)":"var(--card)",borderRadius:8,border:`1px solid ${item.status==="flagged"?"var(--fl-bd)":"var(--bd)"}`,alignItems:"flex-start"}}>
                      <span style={{width:9,height:9,borderRadius:"50%",background:dot,flexShrink:0,marginTop:5}}/>
                      <div style={{flex:1}}>
                        <div style={{fontSize:13,color:"var(--t1)",fontWeight:item.status==="flagged"?600:400}}>{item.label}</div>
                        {item.observation&&<div style={{fontSize:12,color:"var(--t3)",marginTop:2,fontStyle:"italic"}}>{item.observation}</div>}
                        {(item.media||[]).length>0&&<div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:6}}>
                          {item.media.map((m,mi)=>{
                            const photos=item.media.filter(x=>x.type==="photo");
                            const videos=item.media.filter(x=>x.type==="video");
                            return m.type==="photo"
                            ?<img key={mi} src={m.thumbnail_url||m.url}
                              onClick={()=>{const lbItems=photos.map((x,i)=>({type:"photo",url:x.url,caption:`${item.label} – photo ${i+1}`}));openLightbox(lbItems,photos.indexOf(m));}}
                              style={{width:52,height:52,objectFit:"cover",borderRadius:5,border:"1px solid var(--bd)",cursor:"zoom-in"}}/>
                            :<div key={mi} onClick={()=>{const lbItems=videos.map((x,i)=>({type:"video",url:x.url,caption:`${item.label} – video ${i+1}`}));openLightbox(lbItems,videos.indexOf(m));}}
                              style={{width:52,height:52,borderRadius:5,border:"1px solid var(--bd)",background:"#000",display:"flex",alignItems:"center",justifyContent:"center",cursor:"zoom-in"}}><span style={{fontSize:20}}>🎥</span></div>;
                          })}
                        </div>}
                      </div>
                      <Badge status={item.status}/>
                    </div>;
                  })}
                </div>
              </div>}
          </div>}
        </div>;
      })}
    </div>
    {lightbox&&<Lightbox items={lightbox.items} startIdx={lightbox.idx} onClose={()=>setLightbox(null)}/> }
  </div>;
}

// ── ADMIN PANEL ───────────────────────────────────────────────────────────────
const USER_COLORS=["#3b82f6","#8b5cf6","#06b6d4","#10b981","#f59e0b","#ec4899","#ef4444","#f97316","#84cc16","#14b8a6"];
function AdminPanel({authUser,users,setUsers,onClose,ejConfig,setEjConfig,tgConfig,setTgConfig}){
  const isM=authUser?.role==="manager";
  const [tab,setTab]=useState(isM?"team":"pin");
  // PIN change — 3 steps: enter current → enter new → confirm → API call once
  const [ps,setPs]=useState("old");
  const [oldPin,setOldPin]=useState("");
  const [np,setNp]=useState("");
  const [pm,setPm]=useState("");
  const [pl,setPl]=useState(false);
  const handleOld=pin=>{setOldPin(pin);setPm("");setPs("new");};
  const handleNew=pin=>{setNp(pin);setPm("");setPs("confirm");};
  const handleConf=async pin=>{
    if(pin!==np){setPm("PINs don't match.");setPs("new");setNp("");return;}
    setPl(true);setPm("");
    try{
      await api.put("/api/auth/pin",{currentPin:oldPin,newPin:np});
      setPm("✓ PIN updated!");setPs("done");
    }catch(e){
      if(e.status===401){setPm("Current PIN incorrect.");setPs("old");setOldPin("");}
      else{setPm("Update failed: "+e.message);setPs("old");}
    }
    setPl(false);
  };

  // Team mgmt
  const [editingUser,setEditingUser]=useState(null);
  const [addingUser,setAddingUser]=useState(false);
  const [newUser,setNewUser]=useState({name:"",role:"inspector",email:"",color:USER_COLORS[0]});
  const [userErr,setUserErr]=useState("");

  const saveUserEdit=async(id,fields)=>{
    try{const u=await api.put(`/api/users/${id}`,fields);setUsers(p=>p.map(uu=>uu.id===id?{...uu,...u}:uu));setEditingUser(null);}
    catch(e){setUserErr(e.message);}
  };
  const removeUser=async id=>{
    if(!window.confirm("Remove this team member?"))return;
    try{await api.delete(`/api/users/${id}`);setUsers(p=>p.filter(u=>u.id!==id));}
    catch(e){setUserErr(e.message);}
  };
  const addUser=async()=>{
    if(!newUser.name.trim())return;
    try{const u=await api.post("/api/users",{...newUser,pin:"123456"});setUsers(p=>[...p,u]);setNewUser({name:"",role:"inspector",email:"",color:USER_COLORS[0]});setAddingUser(false);}
    catch(e){setUserErr(e.message);}
  };
  const resetPin=async id=>{
    try{await api.post("/api/auth/reset-pin",{targetUserId:id});alert("PIN reset to 123456");}
    catch(e){alert("Reset failed: "+e.message);}
  };

  // Email
  const [ej,setEj]=useState({...ejConfig});const [ejMsg,setEjMsg]=useState("");
  const saveEj=async()=>{try{await api.put("/api/config",{ejPublicKey:ej.ejPublicKey,ejServiceId:ej.ejServiceId,ejTemplateId:ej.ejTemplateId});setEjConfig(ej);setEjMsg("✅ Saved.");}catch(e){setEjMsg("❌ "+e.message);}};

  // Telegram
  const [tg,setTg]=useState({...tgConfig});const [tgMsg,setTgMsg]=useState("");
  const saveTg=async()=>{try{await api.put("/api/config",{tgBotToken:tg.tgBotToken,tgChatId:tg.tgChatId});setTgConfig(tg);setTgMsg("✅ Saved.");}catch(e){setTgMsg("❌ "+e.message);}};

  return <Modal onClose={onClose} title="Menu" maxW={540}>
    <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 13px",background:"var(--surf)",borderRadius:9,border:"1px solid var(--bd)",marginBottom:16}}>
      <Avatar user={authUser} size={38}/>
      <div style={{flex:1}}><div style={{fontWeight:600,fontSize:15,color:"var(--t1)"}}>{authUser.name}</div><Mono size={12}>{authUser.role.toUpperCase()}</Mono></div>
      {isM&&<span style={{fontSize:11,background:"var(--abg)",color:"var(--amber)",padding:"3px 8px",borderRadius:20,fontWeight:600}}>Manager</span>}
    </div>
    <div style={{display:"flex",gap:5,marginBottom:18,flexWrap:"wrap"}}>
      <button onClick={()=>setTab("pin")} style={C.btn(tab==="pin"?"pri":"ghost",{padding:"7px 12px",fontSize:13})}>🔑 PIN</button>
      {isM&&<>
        <button onClick={()=>setTab("team")} style={C.btn(tab==="team"?"pri":"ghost",{padding:"7px 12px",fontSize:13})}>👥 Team</button>
        <button onClick={()=>setTab("email")} style={C.btn(tab==="email"?"pri":"ghost",{padding:"7px 12px",fontSize:13})}>📧 Email</button>
        <button onClick={()=>setTab("telegram")} style={C.btn(tab==="telegram"?"pri":"ghost",{padding:"7px 12px",fontSize:13})}>✈️ Telegram</button>
      </>}
    </div>

    {tab==="pin"&&<div>
      <div style={{background:"var(--abg)",border:"1px solid var(--abd)",borderRadius:8,padding:"10px 13px",marginBottom:14,fontSize:13,color:"var(--t2)"}}>
        To change your PIN: enter current PIN, then new PIN twice. If you've forgotten your PIN, ask a manager to reset it.
      </div>
      {ps==="done"
        ?<div style={{textAlign:"center",padding:"16px 0"}}><div style={{fontSize:28,marginBottom:10}}>✅</div><div style={{fontWeight:600,color:"var(--t1)",marginBottom:10}}>{pm}</div><button onClick={()=>{setPs("old");setNp("");setPm("");setOldPin("");}} style={C.btn("sec")}>Change again</button></div>
        :pl?<div style={{textAlign:"center",padding:"20px"}}><Spinner size={20}/></div>
          :<PinPad onComplete={ps==="old"?handleOld:ps==="new"?handleNew:handleConf} label={ps==="old"?"Current PIN":ps==="new"?"New PIN (6 digits)":"Confirm new PIN"} error={pm}/>
      }
    </div>}

    {tab==="team"&&<div>
      <ErrBox msg={userErr}/>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <span style={{fontWeight:600,fontSize:15,color:"var(--t1)"}}>{users.length} members</span>
        <button onClick={()=>setAddingUser(true)} style={C.btn("pri",{padding:"6px 13px",fontSize:13})}>+ Add</button>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:7,maxHeight:340,overflowY:"auto"}}>
        {users.map(u=>(editingUser?.id===u.id
          ?<div key={u.id} style={{background:"var(--surf)",border:"1px solid var(--blue)",borderRadius:10,padding:"13px 14px"}}>
            <Lbl>Name</Lbl><input value={editingUser.name} onChange={e=>setEditingUser(p=>({...p,name:e.target.value}))} style={C.inp({marginBottom:8})}/>
            <Lbl>Email</Lbl><input type="email" value={editingUser.email||""} onChange={e=>setEditingUser(p=>({...p,email:e.target.value}))} style={C.inp({marginBottom:8})}/>
            <Lbl>Role</Lbl>
            <select value={editingUser.role} onChange={e=>setEditingUser(p=>({...p,role:e.target.value}))} style={C.inp({marginBottom:8})}>
              <option value="inspector">Inspector</option><option value="manager">Manager</option>
            </select>
            <Lbl>Colour</Lbl>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>{USER_COLORS.map(c=><button key={c} onClick={()=>setEditingUser(p=>({...p,color:c}))} style={{width:24,height:24,borderRadius:"50%",background:c,border:editingUser.color===c?"3px solid var(--t1)":"2px solid transparent",cursor:"pointer"}}/>)}</div>
            <div style={{display:"flex",gap:7}}><button onClick={()=>saveUserEdit(u.id,editingUser)} style={C.btn("pri",{flex:1,padding:"8px"})}>Save</button><button onClick={()=>setEditingUser(null)} style={C.btn("ghost",{padding:"8px 12px"})}>Cancel</button></div>
          </div>
          :<div key={u.id} style={{display:"flex",alignItems:"center",gap:10,background:"var(--surf)",border:"1px solid var(--bd)",borderRadius:10,padding:"10px 13px"}}>
            <Avatar user={u} size={34}/>
            <div style={{flex:1,minWidth:0}}><div style={{fontWeight:600,fontSize:14,color:"var(--t1)"}}>{u.name}</div><Mono size={11}>{u.role.toUpperCase()}{u.email?` · ${u.email}`:""}</Mono></div>
            <div style={{display:"flex",gap:5,flexShrink:0}}>
              <button onClick={()=>setEditingUser({...u})} style={C.btn("ghost",{padding:"4px 9px",fontSize:12})}>Edit</button>
              <button onClick={()=>resetPin(u.id)} style={C.btn("sec",{padding:"4px 9px",fontSize:12})}>↺ PIN</button>
              {u.id!==authUser.id&&<button onClick={()=>removeUser(u.id)} style={C.btn("dng",{padding:"4px 8px",fontSize:12})}>✕</button>}
            </div>
          </div>
        ))}
      </div>
      <p style={{fontSize:12,color:"var(--t3)",marginTop:8}}>New members get PIN 123456. They should change on first login.</p>
      {addingUser&&<div style={{marginTop:12,background:"var(--surf)",border:"1px solid var(--green)33",borderRadius:10,padding:"13px"}}>
        <div style={{fontWeight:600,fontSize:14,color:"var(--t1)",marginBottom:11}}>New Team Member</div>
        <Lbl>Name</Lbl><input value={newUser.name} onChange={e=>setNewUser(p=>({...p,name:e.target.value}))} placeholder="Full name" style={C.inp({marginBottom:8})}/>
        <Lbl>Email</Lbl><input type="email" value={newUser.email} onChange={e=>setNewUser(p=>({...p,email:e.target.value}))} placeholder="name@example.com" style={C.inp({marginBottom:8})}/>
        <Lbl>Role</Lbl>
        <select value={newUser.role} onChange={e=>setNewUser(p=>({...p,role:e.target.value}))} style={C.inp({marginBottom:8})}><option value="inspector">Inspector</option><option value="manager">Manager</option></select>
        <Lbl>Colour</Lbl>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>{USER_COLORS.map(c=><button key={c} onClick={()=>setNewUser(p=>({...p,color:c}))} style={{width:24,height:24,borderRadius:"50%",background:c,border:newUser.color===c?"3px solid var(--t1)":"2px solid transparent",cursor:"pointer"}}/>)}</div>
        <div style={{display:"flex",gap:7}}><button onClick={addUser} disabled={!newUser.name.trim()} style={{...C.btn("pri",{flex:1,padding:"9px"}),opacity:newUser.name.trim()?1:.35}}>Add</button><button onClick={()=>setAddingUser(false)} style={C.btn("ghost",{padding:"9px 12px"})}>Cancel</button></div>
      </div>}
    </div>}

    {tab==="email"&&<div style={{display:"flex",flexDirection:"column",gap:11}}>
      <div><Lbl>EmailJS Public Key</Lbl><input value={ej.ejPublicKey||""} onChange={e=>setEj(c=>({...c,ejPublicKey:e.target.value.trim()}))} style={C.inp({fontFamily:"'DM Mono',monospace",fontSize:13})}/></div>
      <div><Lbl>Service ID</Lbl><input value={ej.ejServiceId||""} onChange={e=>setEj(c=>({...c,ejServiceId:e.target.value.trim()}))} style={C.inp({fontFamily:"'DM Mono',monospace",fontSize:13})}/></div>
      <div><Lbl>Template ID</Lbl><input value={ej.ejTemplateId||""} onChange={e=>setEj(c=>({...c,ejTemplateId:e.target.value.trim()}))} style={C.inp({fontFamily:"'DM Mono',monospace",fontSize:13})}/></div>
      {ejMsg&&<div style={{padding:"8px 12px",borderRadius:7,fontSize:13,background:ejMsg.startsWith("✅")?"var(--cl-bg)":"var(--op-bg)",color:ejMsg.startsWith("✅")?"var(--cl-fg)":"var(--op-fg)"}}>{ejMsg}</div>}
      <button onClick={saveEj} style={C.btn("pri",{padding:"9px"})}>💾 Save to Server</button>
      <p style={{fontSize:12,color:"var(--t3)"}}>Credentials stored securely on the server, not in the browser.</p>
    </div>}

    {tab==="telegram"&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div><Lbl>Bot Token</Lbl><input value={tg.tgBotToken||""} onChange={e=>setTg(c=>({...c,tgBotToken:e.target.value.trim()}))} placeholder="1234567890:AABBccDDeeff..." style={C.inp({fontFamily:"'DM Mono',monospace",fontSize:13})}/></div>
      <div><Lbl>Chat ID</Lbl><input value={tg.tgChatId||""} onChange={e=>setTg(c=>({...c,tgChatId:e.target.value.trim()}))} placeholder="-100xxxxxxxxxx" style={C.inp({fontFamily:"'DM Mono',monospace",fontSize:13})}/></div>
      {tgMsg&&<div style={{padding:"8px 12px",borderRadius:7,fontSize:13,background:tgMsg.startsWith("✅")?"var(--cl-bg)":"var(--op-bg)",color:tgMsg.startsWith("✅")?"var(--cl-fg)":"var(--op-fg)"}}>{tgMsg}</div>}
      <button onClick={saveTg} style={C.btn("pri",{padding:"9px"})}>💾 Save to Server</button>
    </div>}
  </Modal>;
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const saved=LS.load("ip_v4_prefs");
  const [authUser,setAuthUser]=useState(()=>LS.load("ip_v4_user"));
  const [users,setUsers]=useState([]);
  const [zones,setZones]=useState([]);
  const [theme,setTheme]=useState(saved?.theme||"dark");
  const [fontScale,setFontScale]=useState(saved?.fontScale||1.0);
  const [view,setView]=useState("home");
  const [showLogin,setShowLogin]=useState(false);
  const [showAdmin,setShowAdmin]=useState(false);
  const [isOnline,setIsOnline]=useState(navigator.onLine);
  const [ejConfig,setEjConfig]=useState({});
  const [tgConfig,setTgConfig]=useState({});
  const [bootstrapErr,setBootstrapErr]=useState("");
  const today=new Date();

  // Persist prefs
  useEffect(()=>{ LS.save("ip_v4_prefs",{theme,fontScale}); },[theme,fontScale]);
  useEffect(()=>{ document.documentElement.setAttribute("data-theme",theme); },[theme]);
  useEffect(()=>{ document.documentElement.style.fontSize=`${fontScale*16}px`; },[fontScale]);
  useEffect(()=>{ if(authUser) LS.save("ip_v4_user",authUser); else localStorage.removeItem("ip_v4_user"); },[authUser]);

  // Online/offline detection
  useEffect(()=>{
    const on=()=>setIsOnline(true);const off=()=>setIsOnline(false);
    window.addEventListener("online",on);window.addEventListener("offline",off);
    return()=>{window.removeEventListener("online",on);window.removeEventListener("offline",off);};
  },[]);

  // Bootstrap: load users + zones on mount
  useEffect(()=>{
    async function bootstrap(){
      try{
        const[u,z]=await Promise.all([api.get("/api/users"),api.get("/api/config/zones")]);
        setUsers(u);setZones(z);
      }catch(e){
        setBootstrapErr("Cannot reach the API server. Check your connection or backend URL.");
      }
      // Load config if manager
      if(authUser?.role==="manager"){
        try{const cfg=await api.get("/api/config");setEjConfig(cfg);setTgConfig(cfg);}catch{}
      }
    }
    bootstrap();
  },[authUser?.role]);

  const handleLogin=u=>{setAuthUser(u);setShowLogin(false);};
  const handleLogout=()=>{setAuthUser(null);localStorage.removeItem("ip_v4_token");setView("home");};
  const nav=v=>{setView(v);};

  return <div style={{fontFamily:"'DM Sans',sans-serif",background:"var(--bg)",minHeight:"100vh",color:"var(--t1)",transition:"background .25s"}}>
    {!isOnline&&<div className="offline-bar">⚠ You're offline — data will sync when reconnected</div>}
    <div style={{marginTop:!isOnline?32:0}}>
      <NavBar view={view} nav={nav} authUser={authUser} onSignIn={()=>setShowLogin(true)} onSignOut={handleLogout} theme={theme} setTheme={setTheme} onAdmin={()=>authUser?setShowAdmin(true):setShowLogin(true)} fontScale={fontScale} setFontScale={setFontScale}/>
      <div className="main-pad" style={{maxWidth:1140,margin:"0 auto"}}>
        {bootstrapErr&&<div style={{padding:"20px",background:"var(--op-bg)",borderRadius:12,color:"var(--op-fg)",marginBottom:16,fontSize:14}}>
          ⚠ {bootstrapErr}<br/><span style={{fontSize:12,opacity:.8}}>API: {API_BASE}</span>
        </div>}
        {view==="home"    &&<HomeView today={today} authUser={authUser} users={users} zones={zones} nav={nav} isOnline={isOnline}/>}
        {view==="inspect" &&<InspectView authUser={authUser} zones={zones} users={users} today={today} ejConfig={ejConfig} tgConfig={tgConfig}/>}
        {view==="tracker" &&<TrackerView authUser={authUser} zones={zones}/>}
        {view==="roster"  &&<RosterView users={users} zones={zones} authUser={authUser} today={today}/>}
        {view==="yearplan"&&<YearPlanView users={users} zones={zones} today={today} authUser={authUser}/>}
        {view==="reports" &&<ReportsView users={users} zones={zones}/>}
      </div>
    </div>
    {!authUser&&<div onClick={()=>setShowLogin(true)} style={{position:"fixed",bottom:"calc(72px + env(safe-area-inset-bottom,0px))",right:18,background:"var(--amber)",color:"#fff",fontWeight:600,fontSize:14,padding:"11px 20px",borderRadius:40,cursor:"pointer",boxShadow:"0 4px 20px rgba(0,0,0,.35)",display:"flex",alignItems:"center",gap:7,zIndex:100}}>🔑 Sign In</div>}
    {showLogin&&<LoginModal users={users} onLogin={handleLogin} onClose={()=>setShowLogin(false)}/>}
    {showAdmin&&authUser&&<AdminPanel authUser={authUser} users={users} setUsers={setUsers} ejConfig={ejConfig} setEjConfig={setEjConfig} tgConfig={tgConfig} setTgConfig={setTgConfig} onClose={()=>setShowAdmin(false)}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
