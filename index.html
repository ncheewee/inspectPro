<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useReducer} = React;

// ── CONFIG ────────────────────────────────────────────────────────────────────
// Set this to your deployed backend URL (Railway / Render / VPS)
// e.g. "https://inspectpro-api.railway.app"
const API_BASE = window.INSPECTPRO_API || "https://inspectpro-api.onrender.com";

const VERSION = "v4";
const DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

// ── UTILS ─────────────────────────────────────────────────────────────────────
const isoWk = d=>{const dd=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const day=dd.getUTCDay()||7;dd.setUTCDate(dd.getUTCDate()+4-day);const y1=new Date(Date.UTC(dd.getUTCFullYear(),0,1));return{week:Math.ceil(((dd-y1)/86400000+1)/7),year:dd.getUTCFullYear()};};
const wkKey  = d=>{const{week,year}=isoWk(d);return`${year}-W${String(week).padStart(2,"0")}`;};
const dowN   = d=>DAYS[(new Date(d).getDay()||7)-1];
const getMon = d=>{const dd=new Date(d);const day=dd.getDay()||7;dd.setDate(dd.getDate()-day+1);dd.setHours(0,0,0,0);return dd;};
const fT     = ts=>new Date(ts).toLocaleTimeString("en-SG",{hour:"2-digit",minute:"2-digit",hour12:false});
const fD     = ts=>new Date(ts).toLocaleDateString("en-SG",{day:"2-digit",month:"short",year:"numeric"});
const fS     = d=>`${d.getDate()}/${d.getMonth()+1}`;
const fDur   = ms=>{const m=Math.round(ms/60000);return`${Math.floor(m/60)}h ${m%60}m`;};
const uid    = ()=>Math.random().toString(36).substr(2,9).toUpperCase();

// Simple debounce hook — returns a debounced version of value after `delay` ms
function useDebounce(value, delay){
  const [debouncedValue, setDebouncedValue] = useState(value);
  useEffect(()=>{
    const timer = setTimeout(()=>setDebouncedValue(value), delay);
    return ()=>clearTimeout(timer);
  },[value, delay]);
  return debouncedValue;
}
const LS     = {load:k=>{try{const d=localStorage.getItem(k);return d?JSON.parse(d):null;}catch{return null;}},save:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}};

// ── API CLIENT ────────────────────────────────────────────────────────────────
const api = {
  _token: ()=>LS.load("ip_v4_token")||"",

  async req(method, path, body, opts={}){
    const headers = {"Content-Type":"application/json"};
    const token = this._token();
    if(token) headers["Authorization"] = `Bearer ${token}`;
    try{
      const res = await fetch(`${API_BASE}${path}`,{
        method, headers,
        body: body ? JSON.stringify(body) : undefined,
        signal: opts.signal,
      });
      const data = await res.json();
      if(!res.ok) throw Object.assign(new Error(data.error||"Request failed"),{status:res.status,data});
      return data;
    }catch(e){
      if(e.name==="AbortError") throw e;
      throw e;
    }
  },
  get:    (path,opts)=>api.req("GET",path,null,opts),
  post:   (path,body,opts)=>api.req("POST",path,body,opts),
  put:    (path,body,opts)=>api.req("PUT",path,body,opts),
  patch:  (path,body,opts)=>api.req("PATCH",path,body,opts),
  delete: (path,opts)=>api.req("DELETE",path,null,opts),
};

// ── IMAGEKIT UPLOAD ───────────────────────────────────────────────────────────
async function uploadToImageKit(file, folder="inspectpro"){
  // 1. Get signed auth from our backend
  const auth = await api.post("/api/media/sign");
  // 2. Build multipart form for ImageKit
  const form = new FormData();
  form.append("file", file);
  form.append("fileName", file.name||`upload_${Date.now()}`);
  form.append("folder", folder);
  form.append("publicKey", auth.publicKey);
  form.append("signature", auth.signature);
  form.append("expire", String(auth.expire));
  form.append("token", auth.token);
  // 3. Upload directly to ImageKit
  const res = await fetch("https://upload.imagekit.io/api/v2/files/upload",{method:"POST",body:form});
  if(!res.ok){const e=await res.text();throw new Error("ImageKit upload failed: "+e);}
  return await res.json(); // {fileId, url, thumbnailUrl, size, name, ...}
}


// ── EMAIL (client-side via EmailJS) ──────────────────────────────────────────
// v4: photos already on ImageKit CDN — embed as <img src="url"> in email HTML.
// No base64 compression needed. Videos remain "view in app" only.
async function buildEmailContent(rec, users, zones) {
  const inspector = users.find(u => u.id === (rec.user_id||rec.userId));
  const zoneObj   = zones.find(z => z.id === (rec.zone_id||rec.zoneId));
  const zoneName  = zoneObj?.name || rec.zone_name || '–';
  const items     = rec.items || [];
  const flagged   = items.filter(i => i.status === 'flagged');
  const okCount   = items.filter(i => i.status === 'ok').length;
  const startTs   = rec.start_time || rec.startTime;
  const endTs     = rec.end_time   || rec.endTime;
  const dur       = endTs ? fDur(new Date(endTs) - new Date(startTs)) : '–';
  const zoneId    = rec.zone_id || rec.zoneId;

  // Plain text
  const lines = [
    'INSPECTPRO – INSPECTION REPORT',
    '================================',
    `Inspector : ${inspector?.name || '–'}`,
    `Zone      : ${zoneId} · ${zoneName}`,
    `Date      : ${fD(startTs)}`,
    `Time      : ${fT(startTs)} – ${endTs ? fT(endTs) : '–'}`,
    `Duration  : ${dur}`,
    `Items OK  : ${okCount}`,
    `Flagged   : ${flagged.length}`,
    '',
  ];
  if (flagged.length > 0) {
    lines.push('FLAGGED ITEMS', '─────────────');
    flagged.forEach((f, i) => {
      lines.push(`${i + 1}. ${f.label}`);
      if (f.observation) lines.push(`   → ${f.observation}`);
      const nPhotos = (f.media || []).filter(m => m.type === 'photo').length;
      const nVids   = (f.media || []).filter(m => m.type === 'video').length;
      if (nPhotos) lines.push(`   📷 ${nPhotos} photo${nPhotos>1?'s':''}`);
      if (nVids)   lines.push(`   🎥 ${nVids} video${nVids>1?'s':''} (view in app)`);
      lines.push('');
    });
  }
  lines.push('ALL ITEMS');
  items.forEach(item => {
    const icon = item.status==='ok' ? '✓' : item.status==='flagged' ? '!' : '–';
    const obs  = item.observation ? ` → ${item.observation}` : '';
    lines.push(`  [${icon}] ${item.label}${obs}`);
  });
  lines.push('', 'InspectPro v4 · Property Inspection Management');
  const plainText = lines.join('\n');

  // HTML email
  const statusColor = flagged.length > 0 ? '#dc2626' : '#059669';
  const statusBg    = flagged.length > 0 ? '#fee2e2' : '#d1fae5';
  const statusLabel = flagged.length > 0
    ? `⚠ ${flagged.length} item${flagged.length>1?'s':''} flagged`
    : '✓ All clear';

  const flaggedHtml = flagged.map((f, fi) => {
    const photos = (f.media||[]).filter(m => m.type==='photo');
    const nVids  = (f.media||[]).filter(m => m.type==='video').length;
    const border = fi < flagged.length-1 ? 'border-bottom:1px solid #fecaca;' : '';
    const photoImgs = photos.map(p =>
      p.url ? `<img src="${p.thumbnail_url||p.url}" width="60" height="60" style="object-fit:cover;border-radius:5px;border:1px solid #fca5a5;margin-right:5px;" alt=""/>` : ''
    ).join('');
    return `<div style="padding:10px 14px;${border}">
      <div style="font-size:13px;font-weight:700;color:#0d1b2e;${f.observation?'margin-bottom:5px;':''}">${f.label}</div>
      ${f.observation ? `<div style="font-size:12px;color:#374151;background:#fff;border-left:3px solid #dc2626;padding:5px 9px;border-radius:0 4px 4px 0;margin-bottom:7px;">${f.observation}</div>` : ''}
      ${photos.length > 0 ? `<div style="margin-top:5px;">${photoImgs}</div>` : ''}
      ${nVids > 0 ? `<div style="margin-top:5px;font-size:11px;color:#6b7280;background:#f3f4f6;padding:3px 7px;border-radius:4px;display:inline-block;">🎥 ${nVids} video${nVids>1?'s':''} (view in app)</div>` : ''}
    </div>`;
  }).join('');

  const checklistHtml = items.map(item => {
    const dot = item.status==='flagged'?'#dc2626':item.status==='ok'?'#059669':'#d1d5db';
    const bg  = item.status==='flagged'?'#fef2f2':item.status==='ok'?'#f0fdf4':'#fff';
    const obsHtml = item.observation
      ? `<div style="color:#9ca3af;font-size:11px;margin-top:2px;font-style:italic;">${item.observation}</div>` : '';
    return `<div style="display:flex;align-items:flex-start;padding:6px 12px;background:${bg};border-bottom:1px solid #f3f4f6;">
      <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${dot};margin-top:4px;margin-right:9px;flex-shrink:0;"></span>
      <div style="font-size:12px;color:#374151;">${item.label}${obsHtml}</div>
    </div>`;
  }).join('');

  const html = `<!DOCTYPE html>
<html><head><meta charset="UTF-8"></head>
<body style="margin:0;padding:0;background:#f3f4f6;font-family:Arial,Helvetica,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f3f4f6;padding:20px 0;">
<tr><td align="center">
<table width="100%" cellpadding="0" cellspacing="0" style="max-width:560px;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.08);">
  <tr><td style="background:#0d1b2e;padding:20px 24px;">
    <table width="100%" cellpadding="0" cellspacing="0"><tr>
      <td><span style="font-size:20px;font-weight:700;color:#fff;">Inspect<span style="color:#f59e0b;">Pro</span> <span style="font-size:12px;color:#8ea0b8;">v4</span></span></td>
      <td align="right"><span style="font-size:12px;color:#8ea0b8;">Inspection Report</span></td>
    </tr></table>
  </td></tr>
  <tr><td style="background:${statusBg};padding:10px 24px;border-bottom:1px solid #e5e7eb;">
    <span style="font-size:14px;font-weight:700;color:${statusColor};">${statusLabel}</span>
    <span style="font-size:12px;color:#6b7280;margin-left:14px;">${fD(startTs)}</span>
  </td></tr>
  <tr><td style="padding:18px 24px 10px;">
    <table width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse;font-size:13px;">
      <tr><td style="padding:5px 0;color:#6b7280;width:100px;border-bottom:1px solid #f3f4f6;">Inspector</td><td style="padding:5px 0;font-weight:700;color:#0d1b2e;border-bottom:1px solid #f3f4f6;">${inspector?.name||'–'}</td></tr>
      <tr><td style="padding:5px 0;color:#6b7280;border-bottom:1px solid #f3f4f6;">Zone</td><td style="padding:5px 0;color:#0d1b2e;border-bottom:1px solid #f3f4f6;">${zoneId} · ${zoneName}</td></tr>
      <tr><td style="padding:5px 0;color:#6b7280;border-bottom:1px solid #f3f4f6;">Time</td><td style="padding:5px 0;color:#0d1b2e;border-bottom:1px solid #f3f4f6;">${fT(startTs)}–${endTs?fT(endTs):'–'} (${dur})</td></tr>
      <tr><td style="padding:5px 0;color:#6b7280;border-bottom:1px solid #f3f4f6;">Items OK</td><td style="padding:5px 0;font-weight:700;color:#059669;border-bottom:1px solid #f3f4f6;">${okCount}</td></tr>
      <tr><td style="padding:5px 0;color:#6b7280;">Flagged</td><td style="padding:5px 0;font-weight:700;color:${statusColor};">${flagged.length}</td></tr>
    </table>
  </td></tr>
  ${flagged.length > 0 ? `<tr><td style="padding:0 24px 16px;">
    <div style="background:#fef2f2;border:1px solid #fca5a5;border-radius:8px;overflow:hidden;">
      <div style="background:#fee2e2;padding:9px 14px;border-bottom:1px solid #fca5a5;">
        <span style="font-size:13px;font-weight:700;color:#dc2626;">⚠ Flagged Items</span>
      </div>
      ${flaggedHtml}
    </div>
  </td></tr>` : ''}
  <tr><td style="padding:0 24px 20px;">
    <div style="font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;">Full Checklist</div>
    ${checklistHtml}
  </td></tr>
  <tr><td style="background:#f9fafb;padding:12px 24px;border-top:1px solid #e5e7eb;text-align:center;">
    <span style="font-size:11px;color:#9ca3af;">InspectPro v4 · ${fD(startTs)}</span>
  </td></tr>
</table>
</td></tr></table>
</body></html>`;

  return { html, plainText };
}

async function sendEmail(to, name, subj, content, cfg={}) {
  const publicKey  = cfg.ejPublicKey  || cfg.publicKey  || '';
  const serviceId  = cfg.ejServiceId  || cfg.serviceId  || '';
  const templateId = cfg.ejTemplateId || cfg.templateId || '';
  if (!publicKey) {
    console.log('Email simulated (no EmailJS config) →', to);
    return { ok: false, sim: true };
  }
  try {
    if (typeof emailjs === 'undefined') throw new Error('EmailJS library not loaded');
    emailjs.init(publicKey);
    await emailjs.send(serviceId, templateId, {
      to_email:  to,
      to_name:   name,
      subject:   subj,
      message:   content.plainText,
      body_html: content.html,
    });
    return { ok: true };
  } catch(e) {
    return { ok: false, err: e.message };
  }
}

async function sendTelegram(text, cfg={}) {
  const token = cfg.tgBotToken || cfg.botToken || '';
  const chat  = cfg.tgChatId   || cfg.chatId   || '';
  if (!token || !chat) { console.log('Telegram not configured'); return {ok:false,sim:true}; }
  try {
    const res = await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({chat_id: chat, text, parse_mode: 'HTML'}),
    });
    const json = await res.json();
    return {ok: json.ok, err: json.description};
  } catch(e) { return {ok: false, err: e.message}; }
}

async function notifyTelegram(subject, body, cfg) {
  return sendTelegram(`<b>${subject}</b>\n\n${body}`, cfg);
}

// ── LIGHTBOX ──────────────────────────────────────────────────────────────────
// Full-screen photo/video viewer. Photos use CDN url, videos use CDN url.
function Lightbox({items, startIdx=0, onClose}) {
  const [idx,setIdx] = useState(startIdx);
  const item = items[idx];
  const prev = () => setIdx(i => (i-1+items.length)%items.length);
  const next = () => setIdx(i => (i+1)%items.length);
  useEffect(()=>{
    const h=e=>{
      if(e.key==="Escape")  onClose();
      if(e.key==="ArrowLeft")  prev();
      if(e.key==="ArrowRight") next();
    };
    document.addEventListener("keydown",h);
    return()=>document.removeEventListener("keydown",h);
  },[idx]);

  return <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.92)",zIndex:600,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
    <div style={{position:"absolute",top:16,left:"50%",transform:"translateX(-50%)",background:"rgba(0,0,0,.6)",color:"#fff",fontSize:13,padding:"4px 12px",borderRadius:20,pointerEvents:"none"}}>
      {idx+1} / {items.length}
    </div>
    <button onClick={onClose} style={{position:"absolute",top:14,right:16,background:"rgba(255,255,255,.15)",border:"none",color:"#fff",fontSize:22,cursor:"pointer",borderRadius:8,width:38,height:38,display:"flex",alignItems:"center",justifyContent:"center",zIndex:1}}>✕</button>
    {items.length>1&&<button onClick={e=>{e.stopPropagation();prev();}} style={{position:"absolute",left:12,background:"rgba(255,255,255,.15)",border:"none",color:"#fff",fontSize:22,cursor:"pointer",borderRadius:8,width:44,height:44,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>}
    <div onClick={e=>e.stopPropagation()} style={{maxWidth:"95vw",maxHeight:"88vh",display:"flex",alignItems:"center",justifyContent:"center"}}>
      {item?.type==="photo"
        ? <img src={item.url} style={{maxWidth:"90vw",maxHeight:"85vh",borderRadius:8,objectFit:"contain",boxShadow:"0 8px 40px rgba(0,0,0,.6)"}} alt=""/>
        : <video src={item.url} controls autoPlay playsInline style={{maxWidth:"90vw",maxHeight:"85vh",borderRadius:8,background:"#000"}}/>
      }
    </div>
    {item?.caption&&<div style={{position:"absolute",bottom:16,left:"50%",transform:"translateX(-50%)",background:"rgba(0,0,0,.7)",color:"#fff",fontSize:13,padding:"6px 14px",borderRadius:20,maxWidth:"80vw",textAlign:"center",pointerEvents:"none"}}>{item.caption}</div>}
    {items.length>1&&<button onClick={e=>{e.stopPropagation();next();}} style={{position:"absolute",right:12,background:"rgba(255,255,255,.15)",border:"none",color:"#fff",fontSize:22,cursor:"pointer",borderRadius:8,width:44,height:44,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>}
  </div>;
}

// ── AUTO-PLAN MODAL ───────────────────────────────────────────────────────────
function AutoPlanModal({users,zones,onClose,today,onApplied}) {
  const inspectors = users.filter(u=>u.role==="inspector");
  const managers   = users.filter(u=>u.role==="manager");
  const [startDate,setStartDate] = useState(()=>{
    const d=getMon(today);d.setDate(d.getDate()+7);return d.toISOString().split("T")[0];
  });
  const [numWeeks,setNumWeeks]   = useState(4);
  const [selDays,setSelDays]     = useState(["Mon","Tue","Wed","Thu","Fri"]);
  const [selInsp,setSelInsp]     = useState(inspectors.map(u=>u.id));
  const [selZones,setSelZones]   = useState(zones.slice(0,5).map(z=>z.id));
  const [supId,setSupId]         = useState("");
  const [preview,setPreview]     = useState(null);
  const [saving,setSaving]       = useState(false);
  const [done,setDone]           = useState(false);
  const [err,setErr]             = useState("");
  const toggleArr=(arr,v)=>arr.includes(v)?arr.filter(x=>x!==v):[...arr,v];

  const generate=()=>{
    if(!selInsp.length||!selZones.length||!selDays.length) return;
    const plan={};
    const start=getMon(new Date(startDate+"T00:00:00"));
    for(let w=0;w<numWeeks;w++){
      const d=new Date(start);d.setDate(d.getDate()+w*7);
      const wk=wkKey(d);
      plan[wk]={};
      const weekSlots=selInsp.map((inspId,iIdx)=>({
        inspectorIds:[inspId],
        supervisorIds:supId?[supId]:[],
        zoneId:selZones[(iIdx+w)%selZones.length],
      }));
      for(const day of selDays) plan[wk][day]=weekSlots;
    }
    setPreview(plan);
  };

  const apply=async()=>{
    if(!preview) return;
    setSaving(true);setErr("");
    try{
      for(const [weekKey,wkData] of Object.entries(preview)){
        const slots=[];
        for(const [day,daySlots] of Object.entries(wkData)){
          for(const s of daySlots) slots.push({day,...s});
        }
        await api.put("/api/roster",{weekKey,slots});
      }
      setDone(true);
      onApplied?.();
    }catch(e){setErr("Save failed: "+e.message);}
    setSaving(false);
  };

  return <Modal onClose={onClose} title="⚡ Auto-Plan Roster" maxW={560}>
    {done
      ?<div style={{textAlign:"center",padding:"24px 0"}}>
        <div style={{fontSize:36,marginBottom:12}}>✅</div>
        <div style={{fontWeight:600,fontSize:16,color:"var(--t1)",marginBottom:6}}>Plan applied!</div>
        <p style={{fontSize:14,color:"var(--t2)",marginBottom:20}}>{numWeeks} weeks · {selDays.length} days/week · {selInsp.length} inspectors across {selZones.length} zones.</p>
        <button onClick={onClose} style={C.btn("pri",{padding:"10px 24px"})}>Done</button>
      </div>
      :<>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
          <div><Lbl>Starting Week</Lbl><input type="date" value={startDate} onChange={e=>setStartDate(e.target.value)} style={C.inp()}/></div>
          <div><Lbl>Duration</Lbl>
            <select value={numWeeks} onChange={e=>setNumWeeks(Number(e.target.value))} style={C.inp()}>
              {[2,4,6,8,12,16,26,52].map(n=><option key={n} value={n}>{n} wk{n===4?" (1 mo)":n===12?" (3 mo)":n===26?" (6 mo)":n===52?" (1 yr)":""}</option>)}
            </select>
          </div>
        </div>
        <Lbl>Active Days</Lbl>
        <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
          {DAYS.map(d=><button key={d} onClick={()=>setSelDays(a=>toggleArr(a,d))} style={{...C.btn(selDays.includes(d)?"pri":"ghost",{padding:"6px 11px",fontSize:13})}}>{d}</button>)}
        </div>
        <Lbl>Inspectors to rotate</Lbl>
        <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:14}}>
          {inspectors.map(u=><label key={u.id} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 10px",background:selInsp.includes(u.id)?"var(--bbg)":"var(--surf)",border:`1px solid ${selInsp.includes(u.id)?"var(--blue)":"var(--bd)"}`,borderRadius:20,cursor:"pointer"}}>
            <input type="checkbox" checked={selInsp.includes(u.id)} onChange={()=>setSelInsp(a=>toggleArr(a,u.id))} style={{accentColor:"var(--blue)",width:13,height:13}}/>
            <Avatar user={u} size={20}/>
            <span style={{fontSize:13,fontWeight:600,color:"var(--t1)"}}>{u.name.split(" ")[0]}</span>
          </label>)}
        </div>
        <Lbl>Zones to rotate ({selZones.length} selected)</Lbl>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
          {zones.map(z=><button key={z.id} onClick={()=>setSelZones(a=>toggleArr(a,z.id))} style={{...C.btn(selZones.includes(z.id)?"pri":"ghost",{padding:"5px 9px",fontSize:12})}}>{z.id}</button>)}
        </div>
        <Lbl>Supervisor for all slots (optional)</Lbl>
        <select value={supId} onChange={e=>setSupId(e.target.value)} style={C.inp({marginBottom:16})}>
          <option value="">None</option>
          {managers.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
        </select>
        <div style={{background:"var(--bbg)",border:"1px solid var(--blue)22",borderRadius:8,padding:"10px 13px",marginBottom:16,fontSize:13,color:"var(--t2)"}}>
          <strong style={{color:"var(--t1)"}}>Rotation:</strong> Each inspector gets one unique zone per week. Zones shift by one each week so all zones are covered across the cycle.
        </div>
        {preview&&<div style={{background:"var(--gbg)",border:"1px solid var(--green)22",borderRadius:8,padding:"10px 13px",marginBottom:14,fontSize:13,color:"var(--t2)"}}>
          ✓ Preview ready: <strong style={{color:"var(--t1)"}}>{Object.keys(preview).length} weeks</strong> · {selInsp.length} inspectors × {selZones.length} zones · {selDays.length} day{selDays.length!==1?"s":""}/week
        </div>}
        {err&&<ErrBox msg={err}/>}
        <div style={{display:"flex",gap:9,justifyContent:"flex-end",flexWrap:"wrap"}}>
          <button onClick={onClose} style={C.btn("ghost")}>Cancel</button>
          {!preview
            ?<button onClick={generate} disabled={!selInsp.length||!selZones.length||!selDays.length} style={{...C.btn("sec",{padding:"9px 18px"}),opacity:(selInsp.length&&selZones.length&&selDays.length)?1:.35}}>Preview →</button>
            :<><button onClick={()=>setPreview(null)} style={C.btn("sec",{padding:"9px 16px"})}>Re-configure</button>
              <button onClick={apply} disabled={saving} style={{...C.btn("pri",{padding:"9px 20px",display:"flex",alignItems:"center",gap:7}),opacity:saving?0.6:1}}>
                {saving?<><Spinner size={13}/>Saving…</>:"✓ Apply Plan"}
              </button>
            </>
          }
        </div>
      </>
    }
  </Modal>;
}

function Modal({onClose,title,children,maxW=440}){
  useEffect(()=>{const h=e=>{if(e.key==="Escape")onClose();};document.addEventListener("keydown",h);return()=>document.removeEventListener("keydown",h);},[onClose]);

// ── PIN PAD ───────────────────────────────────────────────────────────────────
function PinPad({onComplete,label,error,digits:extDigits,setDigits:extSet}){
  const [intDigits,intSet]=useState([]);
  const digits=extDigits||intDigits;
  const setDigits=extSet||intSet;
  const press=d=>{
    if(digits.length>=6)return;
    const n=[...digits,d];setDigits(n);
    if(n.length===6)onComplete(n.join(""));
  };
  const del=()=>setDigits(p=>p.slice(0,-1));
  useEffect(()=>{if(error)setDigits([]);},[error]);
  return <div style={{textAlign:"center"}}>
    <div style={{fontSize:14,color:"var(--t2)",marginBottom:16}}>{label}</div>
    <div style={{display:"flex",gap:10,justifyContent:"center",marginBottom:20}}>
      {[0,1,2,3,4,5].map(i=><span key={i} className={`pin-dot${i<digits.length?" on":""}`}/>)}
    </div>
    {error&&<div style={{fontSize:13,color:"var(--red)",background:"var(--op-bg)",padding:"6px 12px",borderRadius:7,marginBottom:12}}>{error}</div>}
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,maxWidth:210,margin:"0 auto"}}>
      {[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map((k,i)=>
        k===""?<div key={i}/>:
        <button key={i} onClick={()=>k==="⌫"?del():press(String(k))} style={C.btn("sec",{padding:"13px 0",fontSize:18,fontWeight:600,borderRadius:10})}>{k}</button>
      )}
    </div>
  </div>;
}

// ── LOGIN MODAL ───────────────────────────────────────────────────────────────
function LoginModal({users,onLogin,onClose}){
  const [selId,setSelId]=useState("");
  const [step,setStep]=useState("pick");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);
  const user=users.find(u=>u.id===selId);
  const tryPin=async pin=>{
    if(!user)return;
    setLoading(true);setErr("");
    try{
      const res=await api.post("/api/auth/login",{userId:user.id,pin});
      LS.save("ip_v4_token",res.token);
      onLogin(res.user);
    }catch(e){
      setErr(e.status===401?"Incorrect PIN.":"Server error. Try again.");
    }finally{setLoading(false);}
  };
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",backdropFilter:"blur(6px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:500,padding:16}}>
    <div style={{...C.card({background:"var(--card2)"}),maxWidth:380,width:"100%"}}>

        <div style={{display:"flex",alignItems:"center",gap:10}}>

          <span style={{fontWeight:700,fontSize:16,color:"var(--t1)",fontFamily:"'Syne',sans-serif"}}>Sign In</span>
        </div>
        <button onClick={onClose} style={{background:"none",border:"none",color:"var(--t3)",cursor:"pointer",fontSize:20}}>✕</button>
      </div>
      {step==="pick"
        ? <>
            <Lbl>Your Name</Lbl>
            <select value={selId} onChange={e=>setSelId(e.target.value)} style={C.inp({marginBottom:14})}>
              <option value="">— Select your name —</option>
              {users.map(u=><option key={u.id} value={u.id}>{u.name} ({u.role})</option>)}
            </select>
            {selId&&<div style={{display:"flex",alignItems:"center",gap:10,padding:"11px 13px",background:"var(--surf)",borderRadius:9,border:"1px solid var(--bd)",marginBottom:14}}>
              <Avatar user={user} size={40}/>
              <div><div style={{fontWeight:600,fontSize:15,color:"var(--t1)"}}>{user.name}</div><Mono size={12}>{user.role.toUpperCase()} · {user.id}</Mono></div>
            </div>}
            <button onClick={()=>selId&&setStep("pin")} disabled={!selId} style={{...C.btn("pri",{width:"100%",padding:"12px"}),opacity:selId?1:.35}}>Continue →</button>
          </>
        : <>
            <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 13px",background:"var(--surf)",borderRadius:9,border:"1px solid var(--bd)",marginBottom:20}}>
              <Avatar user={user} size={36}/><div style={{flex:1}}><div style={{fontWeight:600,color:"var(--t1)"}}>{user?.name}</div></div>
              <button onClick={()=>{setStep("pick");setErr("");}} style={C.btn("ghost",{padding:"4px 9px",fontSize:12})}>Change</button>
            </div>
            {loading?<div style={{textAlign:"center",padding:"20px"}}><Spinner size={24}/></div>
              :<PinPad onComplete={tryPin} label="Enter your 6-digit PIN" error={err}/>}
          </>
      }
    </div>
  </div>;
}

// ── INSPECT VIEW ──────────────────────────────────────────────────────────────
function InspectView({authUser,zones,users,today,ejConfig,tgConfig}){
  const [step,setStep]=useState("select");
  const [activeInsp,setActiveInsp]=useState(null); // {id, items:[...], zoneId, ...}
  const [sending,setSending]=useState(false);
  const [err,setErr]=useState("");

  const startInspection=async(zoneId)=>{
    setErr("");
    try{
      const insp=await api.post("/api/inspections",{zoneId,startTime:new Date().toISOString()});
      setActiveInsp(insp);
      setStep("zone");
    }catch(e){setErr("Could not start inspection: "+e.message);}
  };

  const updateItem=async(itemId,upd)=>{
    try{
      const updated=await api.patch(`/api/inspections/${activeInsp.id}/item/${itemId}`,upd);
      setActiveInsp(p=>({...p,items:p.items.map(it=>it.id===itemId?{...it,...updated,media:it.media}:it)}));
    }catch(e){console.warn("Item update failed:",e);}
  };

  const addMediaToItem=(itemId,mediaObj)=>{
    setActiveInsp(p=>({...p,items:p.items.map(it=>it.id===itemId?{...it,media:[...(it.media||[]),mediaObj]}:it)}));
  };
  const removeMediaFromItem=(itemId,mediaId)=>{
    setActiveInsp(p=>({...p,items:p.items.map(it=>it.id===itemId?{...it,media:(it.media||[]).filter(m=>m.id!==mediaId)}:it)}));
  };

  const finishZone=()=>setStep("summary");

  const submitInspection=async()=>{
    setSending(true);setErr("");
    try{
      const endTime=new Date().toISOString();
      await api.put(`/api/inspections/${activeInsp.id}/complete`,{endTime});

      // ── Email report ─────────────────────────────────────────────────────
      // Fetch full detail (with items + media) to build the email body
      try{
        const fullRec=await api.get(`/api/inspections/${activeInsp.id}`);
        const emailContent=await buildEmailContent(fullRec,users,zones);
        const inspector=users.find(u=>u.id===authUser.id);
        const subj=`InspectPro Report – ${inspector?.name||authUser.name} – ${fD(endTime)}`;
        const targets=[];
        if(inspector?.email?.trim()) targets.push({email:inspector.email.trim(),name:inspector.name,subj});
        users.filter(u=>u.role==="manager"&&u.email?.trim()).forEach(m=>{
          if(!targets.find(t=>t.email===m.email.trim()))
            targets.push({email:m.email.trim(),name:m.name,subj:`[InspectPro] ${subj}`});
        });
        if(targets.length>0){
          const cfg=ejConfig||{};
          await Promise.allSettled(targets.map(t=>sendEmail(t.email,t.name,t.subj,emailContent,cfg)));
        }
        // ── Telegram notification ───────────────────────────────────────────
        const flagCount=(fullRec.items||[]).filter(i=>i.status==="flagged").length;
        const okCount=(fullRec.items||[]).filter(i=>i.status==="ok").length;
        const flagLines=(fullRec.items||[]).filter(i=>i.status==="flagged")
          .map(i=>`• ${i.label}${i.observation?" – "+i.observation:""}`).join("\n");
        const tgBody=`Inspector: <b>${inspector?.name||authUser.name}</b>\nZone: <b>${fullRec.zone_id} · ${fullRec.zone_name}</b>\nDate: ${fD(endTime)}\nOK: ${okCount} · Flagged: <b>${flagCount}</b>${flagCount>0?"\n\n⚠ Flagged:\n"+flagLines:"\n\n✓ All clear"}`;
        if(tgConfig?.tgBotToken&&tgConfig?.tgChatId){
          notifyTelegram("InspectPro – Inspection Submitted",tgBody,tgConfig).catch(()=>{});
        }
      }catch(notifyErr){
        console.warn("Notification failed (inspection still saved):",notifyErr.message);
      }
      // ────────────────────────────────────────────────────────────────────
      setActiveInsp(null);setStep("select");
    }catch(e){setErr("Submit failed: "+e.message);}
    setSending(false);
  };

  if(!authUser) return <div style={{textAlign:"center",padding:"60px 20px"}}>
    <div style={{fontSize:36,marginBottom:14}}>🔒</div>
    <div style={{fontWeight:600,color:"var(--t1)",fontSize:17,marginBottom:6}}>Sign in to start an inspection</div>
    <p style={{color:"var(--t2)",fontSize:14}}>Use the Sign In button in the top bar.</p>
  </div>;

  return <div>
    {err&&<ErrBox msg={err}/>}
    {step==="select"&&<SelectStep zones={zones} users={users} authUser={authUser} today={today} onStart={startInspection}/>}
    {step==="zone"&&activeInsp&&<ZoneStep inspection={activeInsp} updateItem={updateItem} addMedia={addMediaToItem} removeMedia={removeMediaFromItem} onFinish={finishZone} users={users}/>}
    {step==="summary"&&activeInsp&&<SummaryStep inspection={activeInsp} users={users} zones={zones} onSubmit={submitInspection} sending={sending}/>}
  </div>;
}

function SelectStep({zones,users,authUser,today,onStart}){
  const [roster,setRoster]=useState({});
  const [custom,setCustom]=useState(false);
  const [selZone,setSelZone]=useState("");
  const [loading,setLoading]=useState(true);
  const wk=wkKey(today),dn=dowN(today);

  useEffect(()=>{
    api.get(`/api/roster?week=${wk}`).then(d=>setRoster(d)).catch(()=>{}).finally(()=>setLoading(false));
  },[wk]);

  const todaySlots=roster[dn]||[];
  const mySlots=todaySlots.filter(s=>(s.inspectorIds||[]).includes(authUser?.id)||(s.supervisorIds||[]).includes(authUser?.id));

  return <div style={{maxWidth:580,margin:"0 auto"}} className="fu">
    <h1 style={{fontSize:24,letterSpacing:"-.02em",marginBottom:16}}>Start Inspection</h1>
    <div style={{display:"flex",alignItems:"center",gap:12,padding:"13px 16px",background:"var(--card2)",border:"1px solid var(--bd2)",borderRadius:10,marginBottom:18}}>
      <Avatar user={authUser} size={44}/>
      <div><div style={{fontWeight:600,fontSize:16,color:"var(--t1)"}}>{authUser?.name}</div>
      <Mono size={12}>{authUser?.role?.toUpperCase()}</Mono></div>
    </div>
    {loading?<div style={{textAlign:"center",padding:"24px"}}><Spinner/></div>:
      mySlots.length>0
        ?<div style={C.card({marginBottom:14,border:"1px solid var(--green)33"})}>
          <div style={{fontSize:13,fontWeight:600,background:"var(--cl-bg)",color:"var(--cl-fg)",padding:"3px 10px",borderRadius:20,display:"inline-block",marginBottom:12}}>✓ Assigned Today</div>
          {mySlots.map((s,i)=>{
            const z=zones.find(z=>z.id===s.zoneId);
            return <div key={i} style={{background:"var(--surf)",borderRadius:9,padding:"12px 14px",display:"flex",alignItems:"center",gap:12,marginBottom:6}}>
              <Mono size={13} color="var(--blue)" style={{background:"var(--bbg)",padding:"4px 9px",borderRadius:6,flexShrink:0}}>{s.zoneId}</Mono>
              <div style={{flex:1}}><div style={{fontWeight:600,fontSize:15,color:"var(--t1)"}}>{z?.name}</div>
              <Mono size={11} color="var(--t3)">{z?.items?.length||0} checklist items</Mono></div>
              <button onClick={()=>onStart(s.zoneId)} style={C.btn("pri",{padding:"9px 18px",fontSize:14})}>Start →</button>
            </div>;
          })}
        </div>
        :<div style={{...C.card({marginBottom:14})}}>
          <span style={{fontSize:13,fontWeight:600,background:"var(--pd-bg)",color:"var(--pd-fg)",padding:"3px 10px",borderRadius:20,display:"inline-block",marginBottom:8}}>No Assignment Today</span>
          <p style={{fontSize:13,color:"var(--t3)",marginTop:4}}>You can still inspect any zone below.</p>
        </div>
    }
    <div style={C.card({background:"var(--card2)"})}>
      <button onClick={()=>setCustom(c=>!c)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--t2)",fontSize:13,fontWeight:600,display:"flex",alignItems:"center",gap:6,padding:0}}>
        {custom?"▲":"▼"} Inspect a different zone
      </button>
      {custom&&<div style={{marginTop:14}}>
        {zones.map(z=><div key={z.id} onClick={()=>setSelZone(z.id)} style={{background:selZone===z.id?"var(--bbg)":"var(--surf)",border:`1px solid ${selZone===z.id?"var(--blue)":"var(--bd)"}`,borderRadius:8,padding:"10px 13px",cursor:"pointer",marginBottom:5,transition:"all .15s"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <Mono size={12} color="var(--blue)" style={{background:"var(--bbg)",padding:"2px 7px",borderRadius:4,flexShrink:0}}>{z.id}</Mono>
            <span style={{fontWeight:600,fontSize:14,color:"var(--t1)",flex:1}}>{z.name}</span>
            {selZone===z.id&&<span style={{color:"var(--blue)"}}>✓</span>}
          </div>
        </div>)}
        <button onClick={()=>selZone&&onStart(selZone)} disabled={!selZone} style={{...C.btn("pri",{marginTop:10,width:"100%",padding:"12px",fontSize:14}),opacity:selZone?1:.35}}>
          {selZone?`Start ${selZone} →`:"Select a zone"}
        </button>
      </div>}
    </div>
  </div>;
}

function ZoneStep({inspection,updateItem,addMedia,removeMedia,onFinish,users}){
  const zone={id:inspection.zone_id,name:inspection.zone_name};
  const user=users.find(u=>u.id===inspection.user_id);
  const items=inspection.items||[];
  const allDone=items.every(i=>i.status!=="pending");
  const photoRefs=useRef({});
  // Local observation state — debounced API calls so we don't hit the API on every keystroke
  const [obsMap,setObsMap]=useState(()=>Object.fromEntries((inspection.items||[]).map(it=>[it.id,it.observation||""])));
  const obsTimers=useRef({});
  const [lightbox,setLightbox]=useState(null);
  const openLightbox=(items,idx=0)=>setLightbox({items,idx});
  const handleObsChange=(itemId,value)=>{
    setObsMap(p=>({...p,[itemId]:value}));
    clearTimeout(obsTimers.current[itemId]);
    obsTimers.current[itemId]=setTimeout(()=>{
      updateItem(itemId,{observation:value});
    },600);
  };

  const handlePhoto=async(itemId,e)=>{
    const f=e.target.files?.[0];if(!f)return;
    e.target.value="";
    try{
      const ik=await uploadToImageKit(f,"inspectpro/photos");
      const saved=await api.post("/api/media",{
        inspectionItemId:itemId,type:"photo",
        imagekitFileId:ik.fileId,url:ik.url,
        thumbnailUrl:ik.thumbnailUrl,size:ik.size,name:ik.name,
      });
      addMedia(itemId,saved);
    }catch(e){alert("Photo upload failed: "+e.message);}
  };

  const handleVideo=async(itemId,file)=>{
    try{
      const ik=await uploadToImageKit(file,"inspectpro/videos");
      const saved=await api.post("/api/media",{
        inspectionItemId:itemId,type:"video",
        imagekitFileId:ik.fileId,url:ik.url,
        thumbnailUrl:ik.thumbnailUrl,size:ik.size,name:ik.name,
      });
      addMedia(itemId,saved);
    }catch(e){alert("Video upload failed: "+e.message);}
  };

  const delMedia=async(itemId,mediaId)=>{
    try{await api.delete(`/api/media/${mediaId}`);removeMedia(itemId,mediaId);}
    catch(e){alert("Delete failed: "+e.message);}
  };

  return <div style={{maxWidth:680,margin:"0 auto"}} className="fu">
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
      <Avatar user={user} size={34}/>
      <div style={{flex:1}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
          <Mono size={12}>Checklist</Mono>
          <Mono size={12}>{items.filter(i=>i.status!=="pending").length}/{items.length} done</Mono>
        </div>
        <div style={{height:4,borderRadius:2,background:"var(--bd)",overflow:"hidden"}}>
          <div style={{width:`${(items.filter(i=>i.status!=="pending").length/Math.max(items.length,1))*100}%`,height:"100%",background:"var(--amber)",transition:"width .3s"}}/>
        </div>
      </div>
    </div>

    <div style={{...C.card({background:"var(--card2)",marginBottom:12,padding:"14px 16px"}),display:"flex",alignItems:"center",gap:12}}>
      <div style={{width:46,height:46,background:"var(--bbg)",border:"1px solid var(--blue)33",borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
        <Mono size={13} color="var(--blue)">{zone?.id}</Mono>
      </div>
      <div><h2 style={{fontSize:17,marginBottom:2,color:"var(--t1)"}}>{zone?.name}</h2>
      <Mono size={12}>Started {fT(inspection.start_time)}</Mono></div>
    </div>

    <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:16}}>
      {items.map((item)=>{
        const media=item.media||[];
        return <div key={item.id} style={{background:item.status==="flagged"?"var(--fl-bg)":item.status==="ok"?"var(--ok-bg)":"var(--card)",border:`1px solid ${item.status==="flagged"?"var(--fl-bd)":item.status==="ok"?"var(--ok-fg)33":"var(--bd)"}`,borderRadius:10,padding:"12px 14px",transition:"all .2s"}}>
          <div style={{display:"flex",alignItems:"flex-start",gap:9}}>
            <div style={{display:"flex",gap:5,flexShrink:0}}>
              <button onClick={()=>updateItem(item.id,{status:"ok"})} style={{width:32,height:32,borderRadius:7,cursor:"pointer",fontSize:14,border:`1px solid ${item.status==="ok"?"var(--green)":"var(--bd2)"}`,background:item.status==="ok"?"var(--green)":"transparent",color:item.status==="ok"?"#fff":"var(--t3)",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .15s"}} title="OK">✓</button>
              <button onClick={()=>updateItem(item.id,{status:item.status==="flagged"?"pending":"flagged"})} style={{width:32,height:32,borderRadius:7,cursor:"pointer",fontSize:14,border:`1px solid ${item.status==="flagged"?"var(--red)":"var(--bd2)"}`,background:item.status==="flagged"?"var(--red)":"transparent",color:item.status==="flagged"?"#fff":"var(--t3)",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .15s"}} title="Flag">!</button>
            </div>
            <div style={{flex:1}}>
              <div style={{fontSize:15,fontWeight:600,color:"var(--t1)",lineHeight:1.4}}>{item.label}</div>
              {item.status!=="pending"&&<textarea
                placeholder={item.status==="ok"?"Optional notes…":"Describe the issue…"}
                value={obsMap[item.id]??item.observation??""}
                onChange={e=>handleObsChange(item.id,e.target.value)}
                style={C.inp({marginTop:8,height:56,fontSize:13})}
              />}
              {item.status!=="pending"&&<div style={{marginTop:8,display:"flex",gap:7,alignItems:"center",flexWrap:"wrap"}}>
                <button onClick={()=>photoRefs.current[item.id]?.click()} style={C.btn("ghost",{padding:"5px 10px",fontSize:12})}>
                  📷 Photo{media.filter(m=>m.type==="photo").length>0?` (${media.filter(m=>m.type==="photo").length})`:""}</button>
                <input type="file" accept="image/*" capture="environment" style={{display:"none"}} ref={el=>photoRefs.current[item.id]=el} onChange={e=>handlePhoto(item.id,e)}/>
                <VideoCapture onCapture={f=>handleVideo(item.id,f)}/>
                {media.map((m,mi)=>{
                  const photos=media.filter(x=>x.type==="photo");
                  return m.type==="photo"
                  ?<div key={mi} onClick={()=>{const lbItems=photos.map((x,i)=>({type:"photo",url:x.url,caption:`Photo ${i+1}`}));openLightbox(lbItems,photos.indexOf(m));}} style={{position:"relative",width:56,height:56,borderRadius:6,overflow:"hidden",border:"1px solid var(--bd2)",flexShrink:0,cursor:"zoom-in"}}>
                    <img src={m.thumbnail_url||m.url} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                    <button onClick={e=>{e.stopPropagation();delMedia(item.id,m.id);}} style={{position:"absolute",top:1,right:1,background:"rgba(0,0,0,.7)",border:"none",color:"#fff",borderRadius:3,fontSize:9,cursor:"pointer",padding:"1px 3px"}}>✕</button>
                  </div>
                  :<div key={mi} style={{position:"relative",width:56,height:56,borderRadius:6,overflow:"hidden",border:"1px solid var(--bd2)",flexShrink:0,background:"#000",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <span style={{fontSize:22}}>🎥</span>
                    <button onClick={()=>delMedia(item.id,m.id)} style={{position:"absolute",top:1,right:1,background:"rgba(0,0,0,.7)",border:"none",color:"#fff",borderRadius:3,fontSize:9,cursor:"pointer",padding:"1px 3px"}}>✕</button>
                  </div>;
                })}
              </div>}
            </div>
            <Badge status={item.status}/>
          </div>
        </div>;
      })}
    </div>
    <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
      <button onClick={onFinish} disabled={!allDone} style={{...C.btn("pri",{padding:"12px 26px",fontSize:15}),opacity:allDone?1:0.35}}>
        Complete ✓
      </button>
      {!allDone&&<Mono size={12}>Mark all items (✓ or !) before proceeding.</Mono>}
    </div>
    {lightbox&&<Lightbox items={lightbox.items} startIdx={lightbox.idx} onClose={()=>setLightbox(null)}/>}
  </div>;
}

function SummaryStep({inspection,users,zones,onSubmit,sending}){
  const user=users.find(u=>u.id===inspection.user_id);
  const items=inspection.items||[];
  const flagged=items.filter(i=>i.status==="flagged");
  const ok=items.filter(i=>i.status==="ok");
  const zone=zones.find(z=>z.id===inspection.zone_id);
  return <div style={{maxWidth:680,margin:"0 auto"}} className="fu">
    <div style={{...C.card({border:"1px solid var(--green)33",marginBottom:14})}}>
      <div style={{fontSize:28,marginBottom:7}}>✅</div>
      <h1 style={{fontSize:22,marginBottom:3}}>Inspection Complete</h1>
      <Mono size={12}>{zone?.name} · {fD(inspection.start_time)} · {fT(inspection.start_time)}</Mono>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
      {[
        {l:"Inspector",v:<div style={{display:"flex",alignItems:"center",gap:7}}><Avatar user={user} size={26}/><span style={{fontSize:14,fontWeight:600,color:"var(--t1)"}}>{user?.name}</span></div>},
        {l:"Zone",v:<span style={{fontSize:16,fontWeight:600,color:"var(--cyan)"}}>{zone?.id}</span>},
        {l:"Items OK",v:<span style={{fontSize:24,fontWeight:600,color:"var(--green)",fontFamily:"'DM Mono',monospace"}}>{ok.length}</span>},

// ── VIDEO CAPTURE (upload to ImageKit, not IndexedDB) ─────────────────────────
function VideoCapture({onCapture}){
  const [rec,setRec]=useState(false);const [ct,setCt]=useState(0);const [saving,setSaving]=useState(false);
  const mrRef=useRef(null);const stRef=useRef(null);const ivRef=useRef(null);
  const mobileRef=useRef(null);const desktopRef=useRef(null);
  const isMobile=('ontouchstart' in window)||(navigator.maxTouchPoints>0);

  const onFile=async f=>{if(!f)return;setSaving(true);try{await onCapture(f);}catch(e){alert("Video upload failed: "+e.message);}setSaving(false);};
  const startDesktop=async()=>{
    try{
      const mimes=["video/mp4;codecs=avc1","video/webm;codecs=vp9","video/webm","video/mp4"];
      const mime=mimes.find(m=>MediaRecorder.isTypeSupported?.(m))||"";
      const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"},audio:true});
      stRef.current=stream;
      const mr=new MediaRecorder(stream,mime?{mimeType:mime}:{});
      mrRef.current=mr;const chunks=[];
      mr.ondataavailable=e=>e.data.size>0&&chunks.push(e.data);
      mr.onstop=async()=>{
        const blob=new Blob(chunks,{type:mr.mimeType||"video/webm"});
        stream.getTracks().forEach(t=>t.stop());
        clearInterval(ivRef.current);setRec(false);setCt(0);
        const file=new File([blob],"recording.webm",{type:blob.type});
        await onFile(file);
      };
      mr.start(200);setRec(true);setCt(30);
      ivRef.current=setInterval(()=>setCt(c=>{if(c<=1){stopDesktop();return 0;}return c-1;}),1000);
    }catch{desktopRef.current?.click();}
  };
  const stopDesktop=()=>{clearInterval(ivRef.current);if(mrRef.current?.state==="recording")mrRef.current.stop();};

  if(saving)return <div style={{display:"inline-flex",alignItems:"center",gap:6,fontSize:13,color:"var(--t2)"}}><Spinner size={14}/>Uploading…</div>;
  return <div style={{display:"inline-flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
    {isMobile
      ?<><button onClick={()=>mobileRef.current?.click()} style={C.btn("ghost",{padding:"6px 12px",fontSize:13})}>🎥 Video</button>
        <input type="file" accept="video/*" capture="environment" ref={mobileRef} onChange={e=>{const f=e.target.files?.[0];if(f)onFile(f);e.target.value="";}} style={{display:"none"}}/></>
      :!rec
        ?<div style={{display:"inline-flex",gap:6}}>
          <button onClick={startDesktop} style={C.btn("ghost",{padding:"6px 12px",fontSize:13})}>🎥 Record 30s</button>
          <button onClick={()=>desktopRef.current?.click()} style={C.btn("ghost",{padding:"6px 10px",fontSize:13})} title="Upload video">📎</button>
        </div>
        :<div style={{display:"flex",alignItems:"center",gap:8,padding:"6px 12px",background:"var(--op-bg)",borderRadius:8}}>
          <span style={{width:8,height:8,borderRadius:"50%",background:"var(--red)",animation:"blink 1s infinite",display:"inline-block"}}/>
          <span style={{fontSize:13,color:"var(--op-fg)",fontWeight:600}}>{ct}s</span>
          <button onClick={stopDesktop} style={C.btn("dng",{padding:"4px 10px",fontSize:12})}>Stop</button>
        </div>
    }
    <input type="file" accept="video/*" ref={desktopRef} onChange={e=>{const f=e.target.files?.[0];if(f)onFile(f);e.target.value="";}} style={{display:"none"}}/>
  </div>;
}

// ── TRACKER VIEW ──────────────────────────────────────────────────────────────
function TrackerView({authUser,zones}){
  const [issues,setIssues]=useState([]);
  const [loading,setLoading]=useState(true);
  const [fSt,setFSt]=useState("all");const [fZn,setFZn]=useState("all");
  const [exp,setExp]=useState(null);
  const [err,setErr]=useState("");

  const load=useCallback(async()=>{
    setLoading(true);
    try{
      const params=new URLSearchParams();
      if(fSt!=="all")params.set("status",fSt);
      if(fZn!=="all")params.set("zone",fZn);
      const data=await api.get(`/api/issues?${params}`);
      setIssues(data);
    }catch(e){setErr(e.message);}
    setLoading(false);
  },[fSt,fZn]);

  useEffect(()=>{load();},[load]);

  const updateStatus=async(id,status)=>{
    try{
      await api.put(`/api/issues/${id}`,{status});
      setIssues(p=>p.map(i=>i.id===id?{...i,status}:i));
    }catch(e){setErr(e.message);}
  };

  // note_count kept in sync via onNotePosted callback from TrackerItem
  const handleNotePosted=issueId=>{
    setIssues(p=>p.map(i=>i.id===issueId?{...i,note_count:(i.note_count||0)+1}:i));
  };

  const open=issues.filter(i=>i.status==="open").length;
  const inp=issues.filter(i=>i.status==="in-progress").length;
  const closed=issues.filter(i=>i.status==="closed").length;

  return <div className="fu">
    <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",flexWrap:"wrap",gap:12,marginBottom:18}}>
      <div>
        <h1 style={{fontSize:26,letterSpacing:"-.02em",marginBottom:4}}>Issue Tracker</h1>
        <div style={{display:"flex",gap:9,flexWrap:"wrap"}}>
          <Mono size={13} color="var(--red)">{open} open</Mono><Mono size={13}>·</Mono>
          <Mono size={13} color="var(--amber)">{inp} in progress</Mono><Mono size={13}>·</Mono>
          <Mono size={13} color="var(--green)">{closed} closed</Mono>
        </div>
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        <select value={fSt} onChange={e=>setFSt(e.target.value)} style={C.inp({width:"auto",padding:"7px 10px",fontSize:13})}>
          <option value="all">All Status</option><option value="open">Open</option><option value="in-progress">In Progress</option><option value="closed">Closed</option>
        </select>
        <select value={fZn} onChange={e=>setFZn(e.target.value)} style={C.inp({width:"auto",padding:"7px 10px",fontSize:13})}>
          <option value="all">All Zones</option>
          {zones.map(z=><option key={z.id} value={z.id}>{z.name}</option>)}
        </select>
      </div>
    </div>
    <ErrBox msg={err}/>
    {loading?<div style={{textAlign:"center",padding:"48px"}}><Spinner size={24}/></div>
      :issues.length===0
        ?<div style={C.card({textAlign:"center",padding:"48px",color:"var(--t3)",fontSize:15})}>No issues match.</div>
        :<div style={{display:"flex",flexDirection:"column",gap:7}}>
          {issues.map(item=><TrackerItem key={item.id} item={item} expanded={exp===item.id} onToggle={()=>setExp(exp===item.id?null:item.id)} onUpdateStatus={updateStatus} onNotePosted={handleNotePosted} authUser={authUser}/>)}
        </div>
    }
  </div>;
}

function TrackerItem({item,expanded,onToggle,onUpdateStatus,onNotePosted,authUser}){
  const [note,setNote]=useState("");
  const [notes,setNotes]=useState(null);
  const [loadingNotes,setLoadingNotes]=useState(false);
  const [lightbox,setLightbox]=useState(null);

  useEffect(()=>{
    if(expanded&&notes===null){
      setLoadingNotes(true);
      api.get(`/api/issues/${item.id}`).then(d=>setNotes(d.notes||[])).catch(()=>setNotes([])).finally(()=>setLoadingNotes(false));
    }
  },[expanded,item.id]);

  const postNote=async()=>{
    if(!note.trim())return;
    try{
      const n=await api.post(`/api/issues/${item.id}/notes`,{text:note.trim()});
      setNotes(p=>[...(p||[]),n]);
      setNote("");
      onNotePosted?.(item.id); // bump parent note_count badge
    }catch(e){alert("Could not post note: "+e.message);}
  };

  const media=item.media||[];
  const openLightbox=(items,idx=0)=>setLightbox({items,idx});

  return <div style={{background:"var(--card)",border:`1px solid ${expanded?"var(--bd2)":"var(--bd)"}`,borderRadius:10,overflow:"hidden"}}>
    <div onClick={onToggle} style={{padding:"12px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:9}}>
      <Badge status={item.status}/>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:14,fontWeight:600,color:"var(--t1)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.item_label}</div>
        <div style={{display:"flex",gap:6,marginTop:2,flexWrap:"wrap"}}>
          <Mono size={11} color="var(--t3)" style={{background:"var(--bbg)",padding:"2px 6px",borderRadius:4}}>{item.zone_id}</Mono>
          <Mono size={11} color="var(--t3)">{item.zone_name}</Mono>
          <Mono size={11} color="var(--t3)">· {fD(item.created_at)}</Mono>
          <Mono size={11} color="var(--t3)">· {item.creator_name}</Mono>
          {(item.note_count||0)>0&&<Mono size={11} color="var(--blue)">· {item.note_count} note{item.note_count>1?"s":""}</Mono>}
        </div>
      </div>
      <span style={{color:"var(--t3)",fontSize:11,flexShrink:0}}>{expanded?"▲":"▼"}</span>
    </div>
    {expanded&&<div style={{borderTop:"1px solid var(--bd)",padding:"14px 16px",background:"var(--surf)"}}>
      {item.observation&&<div style={{marginBottom:12}}><Lbl>Observation</Lbl><div style={{fontSize:14,color:"var(--t2)",background:"var(--card)",borderRadius:7,padding:"9px 12px",lineHeight:1.6}}>{item.observation}</div></div>}
      {media.length>0&&<div style={{marginBottom:12}}>
        <Lbl>Media</Lbl>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {media.map((m,i)=>{
            const photos=media.filter(x=>x.type==="photo");
            const videos=media.filter(x=>x.type==="video");
            return m.type==="photo"
            ?<img key={i} src={m.thumbnail_url||m.url}
                onClick={()=>{const lbItems=photos.map((x,j)=>({type:"photo",url:x.url,caption:`Photo ${j+1}`}));openLightbox(lbItems,photos.indexOf(m));}}
                style={{width:80,height:80,objectFit:"cover",borderRadius:7,border:"1px solid var(--bd)",cursor:"zoom-in"}}/>
            :<div key={i}
                onClick={()=>{const lbItems=videos.map((x,j)=>({type:"video",url:x.url,caption:`Video ${j+1}`}));openLightbox(lbItems,videos.indexOf(m));}}
                style={{width:80,height:80,borderRadius:7,border:"1px solid var(--bd)",background:"#000",display:"flex",alignItems:"center",justifyContent:"center",cursor:"zoom-in"}}><span style={{fontSize:28}}>🎥</span></div>;
          })}
        </div>
      </div>}
      <div style={{display:"flex",gap:7,alignItems:"center",marginBottom:12,flexWrap:"wrap"}}>
        <Mono size={11} color="var(--t3)" style={{textTransform:"uppercase"}}>Status:</Mono>
        {["open","in-progress","closed"].map(s=><button key={s} onClick={()=>onUpdateStatus(item.id,s)} style={{...C.btn(s==="closed"?"ok":s==="in-progress"?"sec":"dng",{padding:"5px 12px",fontSize:13}),opacity:item.status===s?1:.45,fontWeight:item.status===s?600:500}}>{s}</button>)}
      </div>
      {loadingNotes?<div style={{padding:"8px"}}><Spinner/></div>:<>
        {notes&&notes.length>0&&<div style={{marginBottom:11}}>
          <Lbl>Activity Log</Lbl>
          {notes.map((n,i)=><div key={i} style={{background:"var(--card)",borderRadius:7,padding:"7px 10px",border:"1px solid var(--bd)",marginBottom:5}}>
            <div style={{fontSize:14,color:"var(--t1)",lineHeight:1.5}}>{n.text}</div>
            <Mono size={11}>{n.creator_name} · {fD(n.created_at)} {fT(n.created_at)}</Mono>
          </div>)}
        </div>}
        <Lbl>Add Note</Lbl>
        <div style={{display:"flex",gap:7}}>
          <input value={note} onChange={e=>setNote(e.target.value)} placeholder="Add a follow-up note…" style={C.inp({flex:1})} onKeyDown={e=>e.key==="Enter"&&postNote()}/>
          <button onClick={postNote} style={C.btn("pri",{padding:"9px 15px",flexShrink:0})}>Post</button>
        </div>
      </>}
    </div>}
    {lightbox&&<Lightbox items={lightbox.items} startIdx={lightbox.idx} onClose={()=>setLightbox(null)}/>}
  </div>;
}

// ── ROSTER VIEW ───────────────────────────────────────────────────────────────
function RosterView({users,zones,authUser,today}){
  const [cur,setCur]=useState(today);
  const [rosterData,setRosterData]=useState({});
  const [loading,setLoading]=useState(true);
  const [editCell,setEditCell]=useState(null);
  const [ef,setEf]=useState({inspIds:[],supIds:[],zoneId:""});
  const [showAutoPlan,setShowAutoPlan]=useState(false);
  const isM=authUser?.role==="manager";
  const wk=wkKey(cur);const{week,year}=isoWk(cur);const monday=getMon(cur);
  const dayDate=i=>{const d=new Date(monday);d.setDate(d.getDate()+i);return d;};

  const load=useCallback(async()=>{
    setLoading(true);
    try{const d=await api.get(`/api/roster?week=${wk}`);setRosterData(d);}
    catch(e){console.warn(e);}
    setLoading(false);
  },[wk]);
  useEffect(()=>{load();},[load]);

  const getSlotsForZoneDay=(zoneId,day)=>(rosterData[day]||[]).filter(s=>s.zoneId===zoneId);

  const saveSlot=async()=>{
    if(!editCell||!ef.zoneId)return;
    // Build full week slots: existing + new/edited
    const allSlots=[];
    for(const day of DAYS){
      for(const s of (rosterData[day]||[])){
        if(editCell.slotId&&s.id===editCell.slotId)continue; // skip being edited
        allSlots.push({day,zoneId:s.zoneId,inspectorIds:s.inspectorIds||[],supervisorIds:s.supervisorIds||[]});
      }
    }
    if(editCell.slotId){
      // editing: replace
      allSlots.push({day:editCell.day,zoneId:ef.zoneId,inspectorIds:ef.inspIds,supervisorIds:ef.supIds});
    }else{
      // new
      allSlots.push({day:editCell.day,zoneId:ef.zoneId,inspectorIds:ef.inspIds,supervisorIds:ef.supIds});
    }
    try{
      await api.put("/api/roster",{weekKey:wk,slots:allSlots});
      await load();setEditCell(null);
    }catch(e){alert("Save failed: "+e.message);}
  };

  const deleteSlot=async(slotId)=>{
    const allSlots=[];
    for(const day of DAYS){
      for(const s of (rosterData[day]||[])){
        if(s.id===slotId)continue;
        allSlots.push({day,zoneId:s.zoneId,inspectorIds:s.inspectorIds||[],supervisorIds:s.supervisorIds||[]});
      }
    }
    try{await api.put("/api/roster",{weekKey:wk,slots:allSlots});await load();}
    catch(e){alert("Delete failed: "+e.message);}
  };

  const toggleId=(arr,id)=>arr.includes(id)?arr.filter(x=>x!==id):[...arr,id];
  const thS={background:"var(--card2)",border:"1px solid var(--bd)",padding:"8px 10px",fontSize:13,fontWeight:600,color:"var(--t2)",textAlign:"center",whiteSpace:"nowrap"};
  const tdS={border:"1px solid var(--bd)",padding:"6px",verticalAlign:"top",minHeight:60};

  return <div className="fu">
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18,flexWrap:"wrap",gap:12}}>
      <div>
        <h1 style={{fontSize:26,letterSpacing:"-.02em",marginBottom:4}}>Weekly Roster</h1>
        <Mono size={13}>Week {week} · {year}</Mono>
      </div>
      <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
        <button onClick={()=>setCur(d=>{const dd=new Date(d);dd.setDate(dd.getDate()-7);return dd;})} style={C.btn("ghost",{padding:"7px 13px"})}>← Prev</button>
        <button onClick={()=>setCur(today)} style={C.btn("sec",{padding:"7px 11px"})}>Today</button>
        <button onClick={()=>setCur(d=>{const dd=new Date(d);dd.setDate(dd.getDate()+7);return dd;})} style={C.btn("ghost",{padding:"7px 13px"})}>Next →</button>
        {isM&&<button onClick={()=>setShowAutoPlan(true)} style={C.btn("pri",{padding:"7px 13px",fontSize:13,display:"flex",alignItems:"center",gap:6})}>⚡ Auto-Plan</button>}
      </div>
    </div>
    {!isM&&<div style={{background:"var(--abg)",border:"1px solid var(--abd)",borderRadius:8,padding:"9px 14px",marginBottom:14,fontSize:14,color:"var(--amber)"}}>👁 View-only. Managers can edit.</div>}
    {loading?<div style={{textAlign:"center",padding:"48px"}}><Spinner size={24}/></div>:
      <div style={{overflowX:"auto",borderRadius:12,border:"1px solid var(--bd)"}}>
        <table style={{width:"100%",borderCollapse:"collapse",minWidth:700}}>
          <thead><tr>
            <th style={{...thS,textAlign:"left",padding:"8px 12px",width:160}}>Zone</th>
            {DAYS.map((d,i)=>{const dd=dayDate(i);const isT=dd.toDateString()===today.toDateString();
              return <th key={d} style={{...thS,color:isT?"var(--amber)":"var(--t2)",background:isT?"var(--abg)":thS.background}}>
                {d}<br/><span style={{fontWeight:400,fontSize:11}}>{fS(dd)}</span>
              </th>;})}
          </tr></thead>
          <tbody>{zones.map(zone=><tr key={zone.id}>
            <td style={{...tdS,background:"var(--card2)"}}>
              <Mono size={12} color="var(--blue)" style={{background:"var(--bbg)",padding:"2px 7px",borderRadius:4,display:"inline-block",marginBottom:4}}>{zone.id}</Mono>
              <div style={{fontSize:13,fontWeight:600,color:"var(--t1)"}}>{zone.name}</div>
            </td>
            {DAYS.map((day,di)=>{const dd=dayDate(di);const isT=dd.toDateString()===today.toDateString();
              const slots=getSlotsForZoneDay(zone.id,day);
              return <td key={day} style={{...tdS,background:isT?"var(--abg)":"transparent",minWidth:110}}>
                <div style={{display:"flex",flexDirection:"column",gap:4}}>
                  {slots.map(s=>{
                    const insps=(s.inspectorIds||[]).map(id=>users.find(u=>u.id===id)).filter(Boolean);
